site_name: エンタープライズAIエージェント・アーキテクチャ・リファレンス
site_description: エンタープライズにAIエージェントを安全に組み込むための意思決定駆動アーキテクチャ・リファレンス
site_author: ""
site_url: https://shibuiwilliam.github.io/enterprise-agent-reference-architectures/
repo_url: https://github.com/shibuiwilliam/enterprise-agent-reference-architectures
repo_name: shibuiwilliam/enterprise-agent-reference-architectures
edit_uri: edit/main/docs/

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: ダークモードへ
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: ライトモードへ
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - ja
        - en
  - redirects:
      redirect_maps:
        # Pattern catalog → Decision pages
        'patterns/index.md': 'decisions/index.md'
