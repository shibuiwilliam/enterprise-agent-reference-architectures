          - "GV-10 Two-Layer Value Measurement（生産性×経営KPI）": patterns/gv-governance/gv10-two-layer-value-measurement.md
          - "GV-2 Agent Catalog & Marketplace（社内カタログ）": patterns/gv-governance/gv2-agent-catalog-marketplace.md
