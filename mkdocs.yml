site_name: エンタープライズAIエージェント アーキテクチャパターン
site_description: >-
  数万人規模の従業員・顧客と多様なSaaSが併存する企業に、AIエージェントを組み込む
  ためのアーキテクチャパターン・カタログ。人間とコーディングエージェントの双方を読者とする。
site_author: "TODO（あなたの組織名）"

# GitHub Pages 公開用。リポジトリ名に合わせて site_url / repo_url を変更すること。
site_url: https://YOUR-ORG.github.io/enterprise-ai-agent-docs/
repo_url: https://github.com/YOUR-ORG/enterprise-ai-agent-docs
repo_name: enterprise-ai-agent-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードへ
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードへ

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search:
      lang: ja

nav:
  - ホーム: index.md
  - 使い方（エージェント向け）:
      - 設計プロトコル: usage/design-protocol.md
      - パターン記述フォーマット規約: usage/pattern-schema.md
      - 提案テンプレート: usage/proposal-template.md
  - パターン一覧:
      - 索引（機械可読）: patterns/index.md
      - 信頼境界:
          - P01 信頼境界の二層分離: patterns/trust-boundary/p01-trust-boundary-split.md
          - P02 マルチテナント分離: patterns/trust-boundary/p02-multi-tenant-isolation.md
      - 統合トポロジー:
          - P03 AIエージェント・ゲートウェイ: patterns/integration/p03-ai-gateway.md
          - P04 MCPゲートウェイ: patterns/integration/p04-mcp-gateway.md
          - P05 インアプリ・コパイロット: patterns/integration/p05-in-app-copilot.md
          - P06 エージェント・ハブ: patterns/integration/p06-agent-hub.md
          - P07 イベント駆動エージェント: patterns/integration/p07-event-driven-agent.md
      - アイデンティティ・認可:
          - P08 トークン交換(OBO): patterns/identity/p08-token-exchange-obo.md
          - P09 動的認可(PDP/PBAC): patterns/identity/p09-dynamic-authz-pdp.md
          - P10 コンテキスト・ファイアウォール: patterns/identity/p10-context-firewall.md
          - P11 ゼロトラスト/サンドボックス: patterns/identity/p11-zero-trust-sandbox.md
      - メモリ・コンテキスト:
          - P12 階層化メモリ: patterns/memory/p12-layered-memory.md
          - P13 コンテキスト・ブローカー: patterns/memory/p13-context-broker.md
          - P14 セマンティックレイヤー: patterns/memory/p14-semantic-layer.md
      - オーケストレーション:
          - P15 シングル vs マルチ: patterns/orchestration/p15-single-vs-multi.md
          - P16 スーパーバイザ/ルーター: patterns/orchestration/p16-supervisor-router.md
          - P17 決定論ワークフロー併用: patterns/orchestration/p17-deterministic-workflow-hybrid.md
          - P18 HITL承認ゲート: patterns/orchestration/p18-hitl-approval-gate.md
      - 確率→決定論:
          - P19 コンパイル型エージェント: patterns/determinism/p19-compiled-agent.md
          - P20 二重トラック検証: patterns/determinism/p20-dual-track-verification.md
          - P21 信頼度ゲート棄権: patterns/determinism/p21-confidence-gated-abstention.md
      - 信頼性・運用・コスト:
          - P22 非同期ジョブ＋コールバック: patterns/reliability/p22-async-job-callback.md
          - P23 サーキットブレーカ/フォールバック: patterns/reliability/p23-circuit-breaker-fallback.md
          - P24 セマンティック/プロンプトキャッシュ: patterns/reliability/p24-semantic-cache.md
          - P25 オブザーバビリティ/トレース: patterns/reliability/p25-observability-tracing.md
          - P26 評価ゲート/カナリア: patterns/reliability/p26-eval-gate-canary.md
          - P27 コストガバナンス: patterns/reliability/p27-cost-governance.md
      - レイテンシ先進:
          - P28 投機的・先読み実行: patterns/latency/p28-speculative-execution.md
          - P29 バックプレッシャ/優先度キュー: patterns/latency/p29-backpressure-load-shedding.md
          - P30 オフライン/オンライン分離: patterns/latency/p30-offline-online-split.md
      - 知識鮮度・ドリフト:
          - P31 CDC駆動の知識鮮度: patterns/freshness/p31-cdc-freshness.md
          - P32 スキーマ/契約ドリフト耐性: patterns/freshness/p32-schema-drift-resilience.md
      - 組織マッピング:
          - P33 部署スコープのエージェント: patterns/organization/p33-department-scoped-agent.md
          - P34 プロジェクト/チームスコープ: patterns/organization/p34-project-scoped-agent.md
          - P35 エージェント・レジストリ: patterns/organization/p35-agent-registry.md
      - ライフサイクル・ガバナンス:
          - P36 デジタル従業員ライフサイクル: patterns/governance/p36-digital-employee-lifecycle.md
          - P37 プロンプト・サプライチェーン: patterns/governance/p37-prompt-supply-chain.md
      - 規制・主権・改善:
          - P38 データ主権/地域分離: patterns/regulation/p38-data-sovereignty.md
          - P39 意思決定プロベナンス: patterns/regulation/p39-decision-provenance.md
          - P40 フィードバックループ: patterns/regulation/p40-feedback-flywheel.md
  - 選定基準:
      - 程度の選定基準: selection/degree-criteria.md
      - 相反する仕組みの選定基準: selection/tension-criteria.md
  - 参照アーキテクチャ・導入順序: reference-architecture.md
