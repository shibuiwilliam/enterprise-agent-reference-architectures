          - "RT-4 Human Approval Chain（組織解決型承認）": patterns/rt-runtime/rt4-human-approval-chain.md
          - "RT-5 Intent-to-Enterprise Command Envelope（構造化コマンド封筒）": patterns/rt-runtime/rt5-command-envelope.md
