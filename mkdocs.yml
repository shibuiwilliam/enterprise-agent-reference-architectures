      - ガバナンス:
          - P36 デジタル従業員ライフサイクル: patterns/governance/p36-digital-employee-lifecycle.md
          - P37 プロンプト・サプライチェーン: patterns/governance/p37-prompt-supply-chain.md
      - 規制・改善:
