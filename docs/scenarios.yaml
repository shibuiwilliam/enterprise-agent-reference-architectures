# scenarios.yaml — Typical enterprise AI agent scenarios
# Each scenario references only tag IDs from docs/vocabulary.yaml
# Pattern dependencies are resolved against docs/patterns-index.yaml requires fields.

scenarios:

  # ── 1. Sales Agent ─────────────────────────────────────────────────────────
  - id: sales_agent
    name: "Sales Agent with CRM Integration"
    name_ja: "CRM連携 Sales Agent"
    description: "Agent assists sales reps with opportunity management, quote generation, and customer follow-up via Salesforce, Sansan, and Slack."
    description_ja: "営業担当の商談管理・見積作成・顧客フォローを Salesforce・Sansan・Slack で支援するエージェント。"
    tags: [cross_saas, write_operations, audit_required, confidential_data, hitl_approval, enterprise_scale]
    saas: [Salesforce, Sansan, Slack, Google Workspace, Zoom]
    recommended_patterns:
      minimum: [EX-1, ID-1, ID-2, ID-6, ID-4, RT-5, RT-4, RT-8, OB-1, OB-2, GV-1]
      # EX-1 requires ID-1, ID-2, ID-6
      # RT-4 requires RT-8, ID-7; ID-7 requires ID-6
      # OB-2 requires GV-1, RT-8
      recommended: [IN-1, IN-2, KM-5, GV-5, GV-7, ID-7, RT-3]
      optional: [RT-6, KM-1, GV-8, KM-3, RT-7]
    rationale: "Sales agents handle customer-confidential data across multiple SaaS. OBO delegation ensures each rep accesses only their own accounts. Human approval chain gates high-value opportunity changes."
    rationale_ja: "営業エージェントは複数SaaSにまたがる顧客機密データを扱う。OBO委譲により各担当者は自分の商談のみアクセス可能。高額案件の変更には人間承認チェーンを適用する。"

  # ── 2. HR Agent ────────────────────────────────────────────────────────────
  - id: hr_agent
    name: "HR Agent with Workday Integration"
    name_ja: "Workday連携 HR Agent"
    description: "Agent supports HR tasks including candidate screening, payroll change drafting, onboarding automation, and attrition risk detection using Workday, Talentio, and Google Workspace."
    description_ja: "採用スクリーニング・給与変更起案・オンボーディング自動化・離職予兆検知を Workday・Talentio・Google Workspace で支援するエージェント。"
    tags: [confidential_data, personal_data, privacy_regulation, audit_required, hitl_approval, sor_writes, enterprise_scale, write_operations]
    saas: [Workday, Talentio, Slack, Google Workspace]
    recommended_patterns:
      minimum: [EX-1, ID-1, ID-2, ID-6, KM-4, KM-6, RT-4, RT-8, RT-6, RT-5, OB-1, OB-2, GV-1]
      # EX-1 requires ID-1, ID-2, ID-6
      # RT-4 requires RT-8, ID-7; RT-6 requires RT-5; OB-2 requires GV-1, RT-8
      recommended: [GV-4, ID-7, KM-5, GV-5, IN-2]
      optional: [KM-7, GV-8, ID-8]
    rationale: "HR agents process highly sensitive personal data governed by labor law and privacy regulations. Scoped memory, DLP boundaries, dual-approval chains, and SoR write gating prevent unauthorized disclosure and unilateral payroll changes."
    rationale_ja: "人事エージェントは労働法・個人情報保護法の規制下で極めて機密度の高い個人データを処理する。スコープ記憶・DLP境界・二段階承認・SoR書き込み境界で不正開示と一方的な給与変更を防ぐ。"

  # ── 3. Customer Support Agent ──────────────────────────────────────────────
  - id: cs_agent
    name: "Customer Support Agent with Zendesk and Shopify"
    name_ja: "Zendesk/Shopify 連携 Customer Support Agent"
    description: "Agent triages, auto-resolves, and supports human operators on customer tickets via Zendesk and Shopify, including refund/return processing with saga-based consistency."
    description_ja: "Zendesk・Shopifyを通じてカスタマーサポートチケットのトリアージ・自動解決・オペレーター支援を行い、Sagaパターンで返金・返品処理の整合性を保つエージェント。"
    tags: [customer_facing, itsm_queue, write_operations, audit_required, multi_saas_saga, async_processing, enterprise_scale]
    saas: [Zendesk, Shopify, Salesforce, Slack]
    recommended_patterns:
      minimum: [EX-1, ID-1, ID-2, ID-6, RT-3, RT-7, RT-8, RT-9, OB-1, OB-2, GV-1]
      # EX-1 requires ID-1, ID-2, ID-6
      # RT-3 requires ID-7; RT-7 requires RT-8; OB-2 requires GV-1, RT-8
      recommended: [KM-1, ID-4, IN-2, ID-7, RT-5]
      optional: [GV-5, GV-8, KM-5, IN-3]
    rationale: "CS agents bridge customer-facing and internal-facing surfaces. ID-1 split prevents internal data leakage. RT-3 tiered autonomy gates refunds above policy thresholds. RT-7 Saga handles multi-system return/refund consistency."
    rationale_ja: "CSエージェントは顧客面と社内面を橋渡しする。ID-1分離で内部データ漏洩を防ぐ。RT-3リスク段階で閾値超の返金を人間承認に振る。RT-7 Sagaで返金・返品のマルチシステム整合性を保つ。"

  # ── 4. Engineering Agent ───────────────────────────────────────────────────
  - id: engineering_agent
    name: "Engineering Agent with GitHub and Jira"
    name_ja: "GitHub/Jira 連携 Engineering Agent"
    description: "Agent supports developers with code review, CI/CD orchestration, incident triage, and test generation via GitHub, Jira, and cloud infrastructure tools."
    description_ja: "コードレビュー・CI/CDオーケストレーション・インシデントトリアージ・テスト生成を GitHub・Jira・クラウドインフラで支援するエージェント。"
    tags: [write_operations, audit_required, high_risk_ops, long_running, enterprise_scale, kubernetes_cloud, vault_sts_infra]
    saas: [GitHub, Jira, Slack, AWS, GCP]
    recommended_patterns:
      minimum: [EX-1, ID-1, ID-2, ID-6, ID-7, IN-1, RT-8, OB-1, GV-9, GV-1]
      # EX-1 requires ID-1, ID-2, ID-6; IN-1 requires ID-6
      # GV-9 requires OB-1, OB-2, GV-1, GV-5
      recommended: [RT-3, RT-5, ID-5, GV-7, OB-2]
      optional: [KM-1, RT-4, GV-5, GV-6, IN-2]
    rationale: "Engineering agents have direct access to production infrastructure. Tool Gateway, sandbox enforcement via PEP, policy-as-code for deployment rules, and kill switch are non-negotiable for safe code execution and CI/CD automation."
    rationale_ja: "エンジニアリングエージェントは本番インフラへの直接アクセスを持つ。Tool Gateway・PEPサンドボックス・ポリシーコードによるデプロイルール・Kill Switchはコード実行とCI/CD自動化の安全上必須だ。"

  # ── 5. Executive Agent ─────────────────────────────────────────────────────
  - id: executive_agent
    name: "Cross-Department Executive Dashboard Agent"
    name_ja: "部門横断 Executive Dashboard Agent"
    description: "Read-oriented agent that federates cross-department KPIs, financial data, and HR metrics for executive decision-making, with strict DLP masking for MNPI and audit lineage."
    description_ja: "経営幹部の意思決定のため部門横断のKPI・財務・人事データをフェデレーションし、MNPI向けDLPマスキングと監査来歴を適用する読み取り指向エージェント。"
    tags: [multi_department, confidential_data, top_secret_data, audit_required, cross_saas_search, enterprise_scale, privacy_regulation]
    saas: [Salesforce, Workday, Google Workspace, BigQuery, Snowflake]
    recommended_patterns:
      minimum: [EX-1, ID-1, ID-2, ID-6, KM-2, KM-3, KM-6, OB-2, GV-1, OB-1]
      # EX-1 requires ID-1, ID-2, ID-6; KM-2 requires ID-2; OB-2 requires GV-1, RT-8
      recommended: [GV-7, GV-8, GV-10, RT-8, ID-4]
      optional: [KM-7, GV-5, KM-5, RT-5]
    rationale: "Executive agents aggregate the broadest data scope, including MNPI-class information. Context Mesh preserves each department's permission model at federation time. Unified audit lineage satisfies securities-law traceability requirements."
    rationale_ja: "経営エージェントはMNPI級情報を含む最広スコープのデータを集約する。コンテキストメッシュがフェデレーション時に各部門の権限モデルを保持する。統一監査来歴が証券法上のトレーサビリティ要件を満たす。"

  # ── 6. Onboarding Automation ───────────────────────────────────────────────
  - id: onboarding_automation
    name: "Event-Driven Employee Onboarding Automation"
    name_ja: "イベント駆動 従業員オンボーディング自動化"
    description: "Autonomous agent triggered by HR system new-hire events to orchestrate account provisioning, equipment requests, training schedules, and day-one Slack welcome across multiple systems."
    description_ja: "HRシステムの入社イベントをトリガーにアカウント発行・備品手配・研修スケジュール・Slackウェルカムを複数システムにまたがり自動オーケストレーションするエージェント。"
    tags: [event_driven, autonomous_exec, async_processing, write_operations, multi_saas_saga, audit_required, enterprise_scale]
    saas: [Workday, Okta, Slack, Google Workspace, Jira]
    recommended_patterns:
      minimum: [ID-3, ID-5, ID-6, RT-7, RT-8, RT-10, OB-1, OB-2, GV-1]
      # ID-3 requires ID-5, ID-6; RT-10 requires RT-7, RT-8; RT-7 requires RT-8
      # OB-2 requires GV-1, RT-8
      recommended: [RT-5, IN-1, IN-2, GV-9, ID-7]
      optional: [GV-4, KM-4, IN-3, GV-8]
    rationale: "Onboarding workflows span many systems (IdP, HCM, equipment, communication) and must survive worker crashes during multi-step provisioning. Workload identity (ID-3) replaces human delegation. Saga pattern ensures partial-failure compensation."
    rationale_ja: "オンボーディングワークフローは多数システム（IdP・HCM・備品・コミュニケーション）にまたがり、多段プロビジョニング中のワーカークラッシュを耐え抜く必要がある。ワークロードIDが人間委譲の代わりを担う。Sagaパターンが部分失敗時の補償を保証する。"

  # ── 7. Refund Automation ───────────────────────────────────────────────────
  - id: refund_automation
    name: "Event-Driven Refund and Return Processing"
    name_ja: "イベント駆動 返金・返品処理自動化"
    description: "Autonomous agent triggered by return request events in Shopify or Zendesk to execute multi-step refund transactions with saga compensation across order, payment, inventory, and ticket systems."
    description_ja: "Shopify・Zendesk の返品リクエストイベントをトリガーに、注文・決済・在庫・チケットにまたがる多段返金トランザクションをSaga補償で実行するエージェント。"
    tags: [event_driven, autonomous_exec, write_operations, multi_saas_saga, audit_required, async_processing, customer_facing]
    saas: [Shopify, Zendesk, Salesforce, Slack]
    recommended_patterns:
      minimum: [ID-1, ID-3, ID-5, ID-6, RT-7, RT-8, RT-10, RT-3, OB-1, OB-2, GV-1]
      # ID-3 requires ID-5, ID-6; RT-10 requires RT-7, RT-8; RT-7 requires RT-8
      # OB-2 requires GV-1, RT-8; RT-3 requires ID-7
      recommended: [RT-5, RT-4, IN-2, IN-1, ID-7]
      optional: [KM-5, GV-5, GV-9, IN-3]
    rationale: "Refund transactions touch order management, payment gateway, inventory, and support ticket simultaneously. Saga with compensation handles partial failures. RT-3 tiered autonomy gates high-value refunds to human approval. ID-1 ensures the customer-facing event bus cannot directly trigger internal finance operations."
    rationale_ja: "返金トランザクションは注文・決済・在庫・サポートチケットを同時に触る。補償付きSagaが部分失敗を処理する。RT-3階層が高額返金を人間承認にゲーティングする。ID-1が顧客面イベントバスから直接内部財務操作を起動できないことを保証する。"

  # ── 8. Knowledge Search ────────────────────────────────────────────────────
  - id: knowledge_search
    name: "Read-Only Internal Knowledge Search"
    name_ja: "社内ナレッジ横断検索（読み取り専用）"
    description: "Read-only agent that searches across internal documents, wikis, tickets, and SaaS knowledge bases with per-user access-controlled RAG, providing cited answers without write operations."
    description_ja: "社内文書・Wiki・チケット・SaaSナレッジベースをユーザー権限別アクセス制御RAGで横断検索し、引用付き回答を返す読み取り専用エージェント。"
    tags: [cross_saas_search, confidential_data, audit_required, frequent_perm_chg, enterprise_scale, persistent_memory]
    saas: [Confluence, Google Drive, Slack, Notion, ServiceNow]
    recommended_patterns:
      minimum: [EX-1, ID-1, ID-2, ID-4, ID-6, KM-1, OB-1, GV-1]
      # EX-1 requires ID-1, ID-2, ID-6; KM-1 requires ID-2, ID-4
      recommended: [KM-2, KM-5, IN-2, GV-5, ID-8]
      optional: [KM-4, EX-4, GV-7, IN-3, GV-8]
    rationale: "Knowledge search is a common first-use-case with high value and low write risk. Access-controlled RAG (KM-1) ensures users only retrieve documents their current entitlements permit. Permission Mirror (ID-4) propagates joiner/mover/leaver changes in near-real time."
    rationale_ja: "ナレッジ検索は高価値・低書き込みリスクの典型的な最初のユースケース。アクセス制御型RAG（KM-1）がユーザーの現在の権限で許可された文書のみ検索結果に返すことを保証する。Permission Mirror（ID-4）が入社・異動・退職の変更をほぼリアルタイムに伝播する。"

  # ── 9. Project Collaboration ───────────────────────────────────────────────
  - id: project_collaboration
    name: "Project Team Shared Collaboration Agent"
    name_ja: "プロジェクトチーム共有 Collaboration Agent"
    description: "Shared agent provisioned per project team, maintaining GraphRAG-based context of decisions, artifacts, and tasks visible to team members per dynamic RBAC, expiring all memory on project closure."
    description_ja: "プロジェクトチームごとにプロビジョニングされ、GraphRAGベースの意思決定・成果物・タスクの文脈を動的RBACでチームメンバーが参照でき、プロジェクト終了時に全メモリを自動失効するエージェント。"
    tags: [project_team, cross_saas_search, persistent_memory, frequent_perm_chg, enterprise_scale, multi_department]
    saas: [Slack, Jira, Confluence, Notion, Box]
    recommended_patterns:
      minimum: [EX-1, ID-1, ID-2, ID-4, ID-6, KM-1, KM-4, RT-11, OB-1, GV-1]
      # EX-1 requires ID-1, ID-2, ID-6; KM-1 requires ID-2, ID-4
      # RT-11 requires KM-1, KM-4, ID-4
      recommended: [KM-2, IN-2, EX-3, GV-3, GV-7]
      optional: [KM-3, RT-8, GV-8, ID-8, EX-4]
    rationale: "Project agents serve a bounded team over weeks to months. Dynamic RBAC workspace provisioning and automatic expiry on project closure prevent stale-access after team dissolves. GraphRAG context (RT-11) allows any member to query accumulated project knowledge within their permission scope."
    rationale_ja: "プロジェクトエージェントは数週間〜数ヶ月の限定チームにサービスする。動的RBACワークスペースプロビジョニングとプロジェクト終了時の自動失効がチーム解散後の権限残留を防ぐ。GraphRAGコンテキスト（RT-11）がメンバーの権限スコープ内で蓄積プロジェクト知識をクエリ可能にする。"

  # ── 10. Compliance Monitor ─────────────────────────────────────────────────
  - id: compliance_monitor
    name: "Compliance Monitoring Agent"
    name_ja: "コンプライアンス監視エージェント"
    description: "Autonomous scheduled agent that scans operational data across SaaS systems for policy violations, generates compliance reports, and triggers escalation workflows for detected exceptions."
    description_ja: "SaaSシステムを横断してポリシー違反を定期スキャンし、コンプライアンスレポートを生成し、検出された例外に対してエスカレーションワークフローを起動するスケジュール自律エージェント。"
    tags: [autonomous_exec, audit_required, regulated_industry, enterprise_scale, event_driven, async_processing, confidential_data]
    saas: [Salesforce, Workday, ServiceNow, Slack, Google Workspace]
    recommended_patterns:
      minimum: [ID-3, ID-5, ID-6, ID-7, GV-1, GV-4, RT-8, RT-10, OB-1, OB-2]
      # ID-3 requires ID-5, ID-6; ID-7 requires ID-6
      # RT-10 requires RT-7, RT-8; RT-7 requires RT-8; OB-2 requires GV-1, RT-8
      recommended: [RT-4, RT-5, GV-7, GV-9, IN-1, GV-6]
      optional: [KM-6, GV-8, KM-5, IN-2]
    rationale: "Compliance monitors run autonomously on schedules and must hold workload identities rather than impersonating humans. Policy-as-code (ID-7) with industry policy packs (GV-4) ensures deterministic violation detection independent of prompt behavior. Unified audit lineage (OB-2) provides the evidence trail regulators require."
    rationale_ja: "コンプライアンス監視はスケジュールで自律動作し、人間のなりすましではなくワークロードIDを持つ必要がある。Policy-as-code（ID-7）と業界ポリシーパック（GV-4）がプロンプト依存ではなく決定論的な違反検知を保証する。統一監査来歴（OB-2）が規制当局が要求する証跡を提供する。"

  # ── 11. Finance Agent ──────────────────────────────────────────────────────
  - id: finance_agent
    name: "Finance Agent for Expense and Invoice Processing"
    name_ja: "経費・請求書処理 Finance Agent"
    description: "Agent that assists finance teams with expense claim review, invoice matching, payment approval routing, and period-close reporting across ERP, accounting SaaS, and Slack."
    description_ja: "経費精算レビュー・請求書照合・支払承認ルーティング・期末締めレポート作成を ERP・会計SaaS・Slack で支援するエージェント。"
    tags: [confidential_data, audit_required, sox_internal_ctrl, write_operations, hitl_approval, sor_writes, enterprise_scale, regulated_industry]
    saas: [SAP, Oracle, Slack, Google Workspace, Workday]
    recommended_patterns:
      minimum: [EX-1, ID-1, ID-2, ID-6, ID-7, RT-3, RT-4, RT-5, RT-6, RT-8, OB-1, OB-2, GV-1]
      # EX-1 requires ID-1, ID-2, ID-6; RT-3 requires ID-7; RT-4 requires RT-8, ID-7
      # RT-6 requires RT-5; OB-2 requires GV-1, RT-8
      recommended: [GV-4, IN-2, IN-4, GV-6, KM-6, GV-5]
      optional: [RT-7, KM-5, GV-8, ID-5]
    rationale: "Finance operations are subject to SOX internal controls requiring approval chains and immutable audit trails for all writes to systems of record. SoR Write Boundary (RT-6) prevents agents from directly updating ERP ledgers. Human Approval Chain (RT-4) enforces dual-control for payment authorizations."
    rationale_ja: "財務操作はSOX内部統制の対象であり、基幹システムへの書き込みに承認チェーンと改ざん不能監査証跡を要求する。SoR書き込み境界（RT-6）がエージェントによるERPへの直接更新を防ぐ。人間承認チェーン（RT-4）が支払承認のデュアルコントロールを適用する。"

  # ── 12. Legal Contract Review ──────────────────────────────────────────────
  - id: legal_contract_review
    name: "Legal Contract Review with Multi-Agent RACI"
    name_ja: "マルチエージェントRACIによる法務契約レビュー"
    description: "Multi-agent workflow for contract review and redlining: extractor agent parses clauses, reviewer agent applies legal policy checks, human legal counsel retains Accountable role, and signatory approval is gated through the approval chain."
    description_ja: "契約書レビュー・修正提案のマルチエージェントワークフロー：抽出エージェントが条項を解析し、レビューエージェントが法務ポリシーチェックを適用し、人間の法務担当がAccountable役割を保持し、署名承認を承認チェーンでゲーティングする。"
    tags: [multi_agent, confidential_data, audit_required, top_secret_data, hitl_approval, regulated_industry, high_risk_ops, enterprise_scale]
    saas: [Google Drive, Box, Slack, DocuSign, ServiceNow]
    recommended_patterns:
      minimum: [EX-1, ID-1, ID-2, ID-4, ID-6, ID-7, RT-2, RT-4, RT-5, RT-8, OB-1, OB-2, GV-1]
      # EX-1 requires ID-1, ID-2, ID-6; RT-2 requires OB-2; OB-2 requires GV-1, RT-8
      # RT-4 requires RT-8, ID-7; RT-3 requires ID-7
      recommended: [KM-1, KM-5, KM-6, GV-4, IN-1, RT-3, GV-7]
      optional: [KM-2, KM-7, GV-5, GV-6, GV-8]
    rationale: "Legal contract review demands clear RACI: agents are Responsible for analysis, human counsel is Accountable for all legal opinions, and Accountable must never be delegated to an AI. RT-2 RACI orchestration enforces this. Top-secret classification of M&A contracts mandates KM-6 DLP at all output boundaries and optionally KM-7 ephemeral context."
    rationale_ja: "法務契約レビューには明確なRACIが必要：エージェントが分析のResponsible、人間の法務担当がAccountable、AccountableはAIに委譲してはならない。RT-2 RACIオーケストレーションがこれを強制する。M&A契約の最高機密分類がすべての出力境界でKM-6 DLPを義務付け、KM-7揮発コンテキストを任意で使用する。"

  # ── 13. Multi-Department Hub Agent ────────────────────────────────────────
  - id: hub_agent
    name: "Multi-Department Hub Agent"
    name_ja: "部門横断ハブエージェント"
    description: "Hub agent that routes employee requests to domain-specific spoke agents (Sales, HR, Engineering, Finance) using intent classification, attenuating permissions from hub to spoke."
    description_ja: "意図分類を使って従業員のリクエストを部門別スポークエージェント（営業・人事・エンジニアリング・財務）にルーティングし、ハブからスポークへ権限を縮退させるハブエージェント。"
    tags: [multi_agent, multi_department, enterprise_scale, cross_saas, audit_required, multi_channel]
    saas: [Slack, Microsoft Teams, Salesforce, Workday, ServiceNow]
    recommended_patterns:
      minimum: [EX-1, EX-3, ID-1, ID-2, ID-4, ID-6, RT-1, GV-1, GV-2, OB-1, OB-2]
      # EX-1 requires ID-1, ID-2, ID-6; EX-3 requires EX-1, ID-2
      # RT-1 requires ID-4; OB-2 requires GV-1, RT-8
      recommended: [GV-3, RT-8, IN-1, IN-2, GV-5, ID-7]
      optional: [KM-2, RT-3, GV-8, EX-4, GV-7]
    rationale: "Hub-and-spoke design scales across departments by routing intents to specialized agents. Each spoke's OBO token is attenuated to its domain scope, preventing cross-domain data leakage. GV-2 Agent Catalog enables employees to discover available spoke agents."
    rationale_ja: "ハブ＆スポーク設計は意図を専門エージェントにルーティングして部門全体にスケールする。各スポークのOBOトークンはドメインスコープに縮退し、ドメイン間データ漏洩を防ぐ。GV-2エージェントカタログが従業員による利用可能スポークエージェントの発見を可能にする。"

  # ── 14. Finance Cost Allocation Agent ─────────────────────────────────────
  - id: cost_allocation_agent
    name: "Enterprise AI Cost Allocation and ROI Agent"
    name_ja: "エンタープライズAIコスト配賦・ROIエージェント"
    description: "Agent that measures LLM token usage, tool call costs, and inference costs per department and project, generates chargeback reports, enforces budget quotas, and surfaces ROI dashboards for management."
    description_ja: "部門・プロジェクト単位でLLMトークン・ツール呼び出し・推論コストを計測し、チャージバックレポートを生成し、予算クォータを適用し、経営向けROIダッシュボードを提供するエージェント。"
    tags: [enterprise_scale, multi_department, cost_mgmt_needed, roi_justification, audit_required, prod_deployment]
    saas: [Salesforce, Workday, Zendesk, Slack, Looker]
    recommended_patterns:
      minimum: [EX-1, ID-1, ID-6, GV-1, GV-5, GV-8, GV-10, OB-1, RT-8]
      # EX-1 requires ID-1, ID-2, ID-6; GV-5 requires GV-1; GV-8 requires GV-1, GV-5
      # GV-10 requires GV-8, OB-1
      recommended: [GV-2, GV-7, OB-2, IN-1, ID-2]
      optional: [GV-3, GV-6, KM-3, EX-4]
    rationale: "AI cost governance is foundational for enterprise AI programs. Central Model Gateway (GV-5) meters every LLM call with cost_center tags. GV-8 enforces department budget caps and generates chargeback reports. GV-10 pairs costs with business KPIs to surface ROI across all use cases."
    rationale_ja: "AIコストガバナンスはエンタープライズAIプログラムの基盤だ。中央モデルゲートウェイ（GV-5）がcost_centerタグですべてのLLM呼び出しを計測する。GV-8が部門予算上限を適用しチャージバックレポートを生成する。GV-10がコストと業務KPIを紐づけて全ユースケースのROIを提示する。"

  # ── 15. Incident Response Automation ──────────────────────────────────────
  - id: incident_response_agent
    name: "IT Incident Response Automation Agent"
    name_ja: "ITインシデント対応自動化エージェント"
    description: "Event-driven agent that monitors alerts from PagerDuty and cloud monitoring, autonomously collects logs and metrics, drafts root-cause hypotheses, and routes high-severity incidents to on-call engineers with full context."
    description_ja: "PagerDuty・クラウド監視のアラートを監視し、ログ・メトリクスを自律収集し、根本原因仮説を起草し、高重大度インシデントをフルコンテキスト付きでオンコールエンジニアにルーティングするイベント駆動エージェント。"
    tags: [event_driven, autonomous_exec, audit_required, async_processing, high_risk_ops, enterprise_scale, real_time_latency]
    saas: [PagerDuty, Slack, GitHub, Datadog, ServiceNow]
    recommended_patterns:
      minimum: [ID-3, ID-5, ID-6, ID-7, RT-8, RT-10, RT-4, GV-9, OB-1, OB-2, GV-1]
      # ID-3 requires ID-5, ID-6; RT-10 requires RT-7, RT-8; RT-4 requires RT-8, ID-7
      # GV-9 requires OB-1, OB-2, GV-1, GV-5; OB-2 requires GV-1, RT-8
      recommended: [IN-1, RT-5, GV-5, GV-7, RT-9]
      optional: [KM-2, GV-6, IN-2, KM-5]
    rationale: "Incident response agents run autonomously without per-request human triggers, requiring workload identity (ID-3) rather than human OBO delegation. Kill Switch (GV-9) is critical to prevent an automated remediation agent from causing cascading outages. RT-4 approval chain gates any automated infrastructure changes above defined risk thresholds."
    rationale_ja: "インシデント対応エージェントはリクエストごとの人間トリガーなしに自律動作し、人間OBO委譲ではなくワークロードID（ID-3）を必要とする。Kill Switch（GV-9）は自動修復エージェントによるカスケード障害を防ぐために不可欠だ。RT-4承認チェーンが定義されたリスク閾値を超える自動インフラ変更をゲーティングする。"
