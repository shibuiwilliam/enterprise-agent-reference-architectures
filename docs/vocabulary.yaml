# vocabulary.yaml — Controlled tag vocabulary for applies_when / not_applicable_when
# All tags are snake_case, max 15 characters (excluding separating underscores up to reasonable length).
# Each tag is composable: combine 3-6 tags per pattern to describe adoption conditions.

tags:

  # ── Scale / Deployment scope ─────────────────────────────────────────────
  - id: enterprise_scale
    description: "Deployment involves a large number of users (hundreds to tens of thousands) or multiple departments across the enterprise."
    description_ja: "数百〜数万人規模のユーザーまたは複数部門にまたがる全社規模の展開。"
    question: "Is the deployment enterprise-wide or large-scale (>100 users / multiple departments)?"
    question_ja: "全社または大規模（100人超・複数部門）の展開か？"

  - id: multi_department
    description: "Multiple distinct organizational departments are involved as owners, users, or stakeholders."
    description_ja: "複数の独立した組織部門が所有者・利用者・関係者として関与する。"
    question: "Do multiple departments own, use, or govern the agent?"
    question_ja: "複数部門がエージェントを所有・利用・統制しているか？"

  - id: poc_phase
    description: "The project is in a proof-of-concept or early experimental stage with few users and limited scope."
    description_ja: "少数のユーザーと限定スコープを持つPoC・初期実験段階。"
    question: "Is this a PoC or early experiment (few users, throwaway, limited scope)?"
    question_ja: "PoC・初期実験（少数ユーザー・使い捨て・限定スコープ）か？"

  - id: single_team
    description: "A single team operates the agent for a single, well-defined purpose without cross-team involvement."
    description_ja: "単一チームが単一の明確な目的でエージェントを運用し、チームをまたがない。"
    question: "Is a single team solely responsible with no cross-team coordination needed?"
    question_ja: "単一チームのみが担当し、チーム横断の調整が不要か？"

  - id: multi_channel
    description: "The agent is accessed through multiple channels (Slack, Teams, Web, Mobile, SaaS-embedded, API) simultaneously or incrementally."
    description_ja: "エージェントが複数チャネル（Slack/Teams/Web/モバイル/SaaS埋め込み/API）から同時または段階的にアクセスされる。"
    question: "Does the agent serve (or will it serve) more than one channel?"
    question_ja: "エージェントが複数チャネルを提供する（または予定）か？"

  # ── Compliance & Audit ────────────────────────────────────────────────────
  - id: audit_required
    description: "Regulatory, legal, or internal compliance requirements mandate audit trails for agent actions."
    description_ja: "規制・法令・内部コンプライアンス要件がエージェント行為の監査証跡を義務付ける。"
    question: "Is an audit trail of agent actions legally or operationally required?"
    question_ja: "エージェント行為の監査証跡が法的または運用上必要か？"

  - id: regulated_industry
    description: "The organization operates in a strictly regulated sector (finance, healthcare, pharma, public sector, legal) with periodic external audits."
    description_ja: "外部監査が定期実施される厳格規制業界（金融・医療・製薬・公共・法務）で運用する。"
    question: "Is the organization subject to strict industry regulations with external audits?"
    question_ja: "外部監査を伴う厳格な業界規制の対象組織か？"

  - id: privacy_regulation
    description: "Data privacy regulations (GDPR, APPI, CCPA, etc.) impose specific obligations for PII handling, consent, and right-to-erasure."
    description_ja: "データプライバシー規制（GDPR・APPI・CCPA等）がPII処理・同意・消去権について義務を課す。"
    question: "Do privacy regulations (GDPR, APPI, etc.) apply to this agent's data handling?"
    question_ja: "プライバシー規制（GDPR・APPI等）がこのエージェントのデータ処理に適用されるか？"

  - id: sox_internal_ctrl
    description: "SOX compliance or equivalent internal control framework requires write operations on systems of record to have approval and audit trails."
    description_ja: "SOXまたは同等の内部統制フレームワークが基幹システムへの書き込みに承認・監査証跡を要求する。"
    question: "Does SOX or equivalent internal control require write approval and audit trails?"
    question_ja: "SOXまたは同等の内部統制が書き込み承認・監査証跡を要求するか？"

  # ── Identity & Access ─────────────────────────────────────────────────────
  - id: cross_saas
    description: "The agent accesses or writes to multiple distinct SaaS systems within a single workflow."
    description_ja: "エージェントが単一ワークフロー内で複数の異なるSaaSにアクセスまたは書き込みを行う。"
    question: "Does the agent span two or more distinct SaaS systems in one workflow?"
    question_ja: "エージェントが1つのワークフローで2つ以上のSaaSにまたがるか？"

  - id: customer_facing
    description: "The agent interacts with external customers (B2C or B2B) and must be separated from the internal workforce-facing surface."
    description_ja: "エージェントが外部顧客（B2CまたはB2B）と対話し、従業員向け面と分離が必要。"
    question: "Does the agent serve external customers separately from internal employees?"
    question_ja: "エージェントが内部従業員とは別に外部顧客にサービスするか？"

  - id: personal_data
    description: "The agent accesses personal data such as employee email, calendar, documents, or customer PII."
    description_ja: "エージェントが従業員のメール・カレンダー・文書や顧客PIIなどの個人データにアクセスする。"
    question: "Does the agent access personal data (email, calendar, documents, PII)?"
    question_ja: "エージェントが個人データ（メール・カレンダー・文書・PII）にアクセスするか？"

  - id: autonomous_exec
    description: "The agent executes autonomously without a per-request human trigger, e.g., scheduled batch or event-driven workflows."
    description_ja: "エージェントがスケジュールバッチやイベント駆動で、リクエストごとの人間の起動なしに自律実行する。"
    question: "Does the agent run autonomously without a human trigger per execution?"
    question_ja: "エージェントが実行ごとの人間トリガーなしに自律実行するか？"

  - id: frequent_perm_chg
    description: "Users frequently join, move, or leave the organization, causing frequent permission changes that must propagate quickly to the agent."
    description_ja: "入社・異動・退職が多く、権限変更がエージェントに迅速に伝播する必要がある。"
    question: "Are permission changes frequent due to joiners, movers, and leavers?"
    question_ja: "入社・異動・退職による権限変更が頻繁に発生するか？"

  - id: legacy_saas_mix
    description: "The environment includes legacy SaaS or custom systems that do not support modern delegation protocols (OBO, OIDC)."
    description_ja: "現代の委譲プロトコル（OBO・OIDC）をサポートしないレガシーSaaSやカスタムシステムが混在する。"
    question: "Are there legacy SaaS or custom systems that do not support OBO delegation?"
    question_ja: "OBO委譲に非対応のレガシーSaaSまたはカスタムシステムが混在するか？"

  # ── Data Sensitivity ──────────────────────────────────────────────────────
  - id: confidential_data
    description: "The agent processes confidential or restricted data (trade secrets, HR records, legal docs, financial records, insider info)."
    description_ja: "エージェントが機密・制限データ（営業秘密・人事記録・法的文書・財務記録・インサイダー情報）を処理する。"
    question: "Does the agent process confidential or restricted data?"
    question_ja: "エージェントが機密または制限データを処理するか？"

  - id: top_secret_data
    description: "The agent processes top-secret or highest-classification data (M&A, HR evaluations, insider information) that must not appear in any logs."
    description_ja: "M&A・人事評価・インサイダー情報等の最高機密データを処理し、いかなるログにも残してはならない。"
    question: "Is the data top-secret (M&A, HR evaluation, insider info) requiring zero log residue?"
    question_ja: "データが最高機密（M&A・人事評価・インサイダー情報）でログ残留がゼロ必要か？"

  - id: external_llm_api
    description: "The agent routes requests to an external LLM API (Claude, GPT, Gemini, etc.) outside the organization's network perimeter."
    description_ja: "エージェントが組織のネットワーク境界外の外部LLM API（Claude・GPT・Gemini等）にリクエストを送信する。"
    question: "Does the agent send data to an external LLM API outside the org perimeter?"
    question_ja: "エージェントが組織境界外の外部LLM APIにデータを送信するか？"

  - id: public_data_only
    description: "The agent handles only publicly accessible information with no access control requirements."
    description_ja: "エージェントがアクセス制御不要の公開情報のみを扱う。"
    question: "Does the agent handle only public information with no access control needed?"
    question_ja: "エージェントがアクセス制御不要の公開情報のみを扱うか？"

  # ── Operations & Risk ─────────────────────────────────────────────────────
  - id: write_operations
    description: "The agent performs write, update, or delete operations on business systems (not read-only)."
    description_ja: "エージェントが業務システムに書き込み・更新・削除操作を実行する（読み取り専用ではない）。"
    question: "Does the agent write, update, or delete data in business systems?"
    question_ja: "エージェントが業務システムにデータを書き込み・更新・削除するか？"

  - id: high_risk_ops
    description: "The agent can initiate high-risk or irreversible operations such as fund transfers, permission grants, contract signing, or bulk data changes."
    description_ja: "エージェントが送金・権限付与・契約締結・大量データ変更などの高リスクまたは不可逆操作を起動できる。"
    question: "Can the agent trigger high-risk or irreversible operations (fund transfer, permission grant, etc.)?"
    question_ja: "エージェントが高リスクまたは不可逆操作（送金・権限付与等）を起動できるか？"

  - id: hitl_approval
    description: "Human-in-the-loop approval is required for specific operations before the agent can proceed."
    description_ja: "特定の操作についてエージェントが実行する前に人間の承認（HitL）が必要。"
    question: "Do specific agent operations require explicit human approval before execution?"
    question_ja: "特定のエージェント操作が実行前に人間の明示的な承認を必要とするか？"

  - id: real_time_latency
    description: "The use case requires real-time or near-real-time responses (sub-second to a few seconds) that prohibit asynchronous or queued processing."
    description_ja: "ユースケースがリアルタイムまたは準リアルタイムの応答（数秒以下）を要求し、非同期・キュー処理を禁止する。"
    question: "Does the use case require real-time response (seconds or faster)?"
    question_ja: "ユースケースがリアルタイム応答（数秒以下）を要求するか？"

  - id: long_running
    description: "Tasks run for minutes to hours and must survive worker crashes, restarts, or human approval waits."
    description_ja: "タスクが数分〜数時間実行され、ワーカークラッシュ・再起動・人間承認待ちを越えて継続する必要がある。"
    question: "Do tasks run for minutes or hours and require crash resilience or approval waits?"
    question_ja: "タスクが数分〜数時間実行され、クラッシュ耐性や承認待ちが必要か？"

  - id: async_processing
    description: "The majority of processing can run asynchronously in the background without requiring the human to wait."
    description_ja: "処理の大部分がバックグラウンドで非同期に実行でき、人間がリアルタイムで待機する必要がない。"
    question: "Can processing run asynchronously without requiring the human to wait in real time?"
    question_ja: "人間がリアルタイムで待機せずにバックグラウンドで処理できるか？"

  - id: event_driven
    description: "Agent workflows are triggered by SaaS or system events (webhooks, CDC, schedule) rather than direct user requests."
    description_ja: "エージェントのワークフローが直接のユーザーリクエストではなくSaaSやシステムのイベント（Webhook・CDC・スケジュール）でトリガーされる。"
    question: "Are agent workflows triggered by events (webhooks, CDC, schedules) rather than direct user requests?"
    question_ja: "エージェントのワークフローが直接のユーザーリクエストではなくイベントでトリガーされるか？"

  # ── Architecture & Infrastructure ─────────────────────────────────────────
  - id: multi_agent
    description: "The solution requires two or more coordinated agents, each with distinct responsibilities or domain ownership."
    description_ja: "ソリューションが2つ以上の協調するエージェントを必要とし、それぞれが異なる責任またはドメイン所有権を持つ。"
    question: "Does the solution involve two or more agents with distinct roles or domains?"
    question_ja: "ソリューションが異なる役割またはドメインを持つ2つ以上のエージェントを含むか？"

  - id: existing_ipaas
    description: "The organization already operates an iPaaS platform (MuleSoft, Workato, Boomi, ESB) with existing integration flows."
    description_ja: "組織が既存の統合フローを持つiPaaSプラットフォーム（MuleSoft・Workato・Boomi・ESB）をすでに運用している。"
    question: "Does the organization already run an iPaaS with existing integration flows?"
    question_ja: "組織が既存の統合フローを持つiPaaSをすでに運用しているか？"

  - id: sor_writes
    description: "The agent writes to systems of record (SoR) such as ERP, HCM, CRM, or accounting systems that hold master data."
    description_ja: "エージェントがマスターデータを保有するERP・HCM・CRM・会計システム等の基幹システム（SoR）に書き込む。"
    question: "Does the agent write to systems of record (ERP, HCM, CRM, accounting)?"
    question_ja: "エージェントがSoR（ERP・HCM・CRM・会計）に書き込むか？"

  - id: multi_saas_saga
    description: "Business workflows span multiple SaaS systems with sequential writes that require compensation (rollback) on partial failure."
    description_ja: "業務ワークフローが複数SaaSにまたがり、部分失敗時の補償（ロールバック）が必要な順次書き込みを伴う。"
    question: "Do multi-SaaS workflows need compensation (rollback) on partial failure?"
    question_ja: "マルチSaaSワークフローが部分失敗時の補償（ロールバック）を必要とするか？"

  - id: vault_sts_infra
    description: "A secret management infrastructure (HashiCorp Vault, AWS STS, Azure Managed Identity) is already in place."
    description_ja: "シークレット管理基盤（HashiCorp Vault・AWS STS・Azure Managed Identity）がすでに整備されている。"
    question: "Is a Vault/STS or equivalent secret management infrastructure already in place?"
    question_ja: "Vault/STSまたは同等のシークレット管理基盤がすでに整備されているか？"

  - id: kubernetes_cloud
    description: "Workloads run on Kubernetes or a major cloud platform where workload identity and dynamic scaling are available."
    description_ja: "ワークロードがKubernetesまたはワークロードIDと動的スケーリングが利用可能なクラウドで動作する。"
    question: "Do workloads run on Kubernetes or a cloud platform with workload identity support?"
    question_ja: "ワークロードがKubernetesまたはワークロードIDをサポートするクラウドで動作するか？"

  # ── Knowledge & Memory ────────────────────────────────────────────────────
  - id: cross_saas_search
    description: "Users need to search or retrieve information across multiple SaaS knowledge sources (documents, tickets, CRM, chat) in a single query."
    description_ja: "ユーザーが単一クエリで複数のSaaSナレッジソース（文書・チケット・CRM・チャット）を横断検索・取得する必要がある。"
    question: "Do users need to search across multiple SaaS knowledge sources in one query?"
    question_ja: "ユーザーが複数SaaSナレッジソースを横断検索するか？"

  - id: persistent_memory
    description: "The agent must remember context across sessions, users, or projects over time."
    description_ja: "エージェントがセッション・ユーザー・プロジェクトを越えて時間的にコンテキストを記憶する必要がある。"
    question: "Must the agent retain context across sessions, users, or projects?"
    question_ja: "エージェントがセッション・ユーザー・プロジェクトを越えてコンテキストを保持する必要があるか？"

  - id: multi_purpose_agent
    description: "A single agent instance is reused across multiple distinct business purposes with different data access needs."
    description_ja: "単一エージェントインスタンスが異なるデータアクセスニーズを持つ複数の異なる業務目的で再利用される。"
    question: "Is the same agent reused for multiple business purposes with different data needs?"
    question_ja: "同じエージェントが異なるデータニーズを持つ複数の業務目的で再利用されるか？"

  # ── Governance & Measurement ───────────────────────────────────────────────
  - id: prod_deployment
    description: "The agent is deployed to production and serves real business operations (not a sandbox or PoC)."
    description_ja: "エージェントが本番環境にデプロイされ実際の業務運用を担う（サンドボックスやPoCではない）。"
    question: "Is the agent in production serving real business operations?"
    question_ja: "エージェントが実際の業務運用を担う本番環境にあるか？"

  - id: continuous_updates
    description: "The agent's model, prompt, tool, or policy is updated on a regular basis requiring version control and safe rollout."
    description_ja: "エージェントのモデル・プロンプト・ツール・ポリシーが定期的に更新され、バージョン管理と安全なロールアウトが必要。"
    question: "Are model, prompt, tool, or policy updates regular and require safe rollout?"
    question_ja: "モデル・プロンプト・ツール・ポリシーの定期的な更新と安全なロールアウトが必要か？"

  - id: cost_mgmt_needed
    description: "Token and inference costs are significant enough to require departmental allocation, budget caps, or ROI measurement."
    description_ja: "トークンおよび推論コストが部門配賦・予算上限・ROI計測を必要とするほど大きい。"
    question: "Are AI costs large enough to require departmental allocation, caps, or ROI measurement?"
    question_ja: "AIコストが部門配賦・上限・ROI計測を必要とするほど大きいか？"

  - id: adoption_challenge
    description: "User adoption or trust is a significant challenge; credibility and value demonstration are needed to sustain usage."
    description_ja: "ユーザーの定着率や信頼が重大な課題であり、信頼性と価値実証が継続利用に必要。"
    question: "Is user adoption or trust a significant challenge requiring active credibility building?"
    question_ja: "ユーザー定着や信頼が重大な課題であり、積極的な信頼構築が必要か？"

  - id: roi_justification
    description: "AI investment must be justified to management or business units through measurable ROI tied to business KPIs."
    description_ja: "AI投資が業務KPIと紐づいた計測可能なROIで経営や事業部門に正当化される必要がある。"
    question: "Must AI investment be justified through measurable ROI tied to business KPIs?"
    question_ja: "AI投資が業務KPIと紐づいたROIで正当化される必要があるか？"

  # ── Specific Conditions ───────────────────────────────────────────────────
  - id: itsm_queue
    description: "An existing ITSM or customer support queue system (ServiceNow, Zendesk, Jira SM) manages work and SLA."
    description_ja: "既存のITSMまたはカスタマーサポートキューシステム（ServiceNow・Zendesk・Jira SM）が業務とSLAを管理する。"
    question: "Does an existing ITSM or support queue (ServiceNow, Zendesk) manage work and SLA?"
    question_ja: "既存のITSMまたはサポートキュー（ServiceNow・Zendesk）が業務とSLAを管理するか？"

  - id: project_team
    description: "The agent serves a defined project team of multiple members collaborating over weeks or months."
    description_ja: "エージェントが数週間〜数ヶ月にわたって協働する複数メンバーのプロジェクトチームにサービスする。"
    question: "Does the agent serve a multi-member project team collaborating over weeks or months?"
    question_ja: "エージェントが数週間〜数ヶ月にわたって協働する複数メンバーのプロジェクトチームにサービスするか？"

  - id: high_api_volume
    description: "Agent traffic generates high SaaS API call volumes (>1,000 users or batch jobs) that risk hitting rate/quota limits."
    description_ja: "エージェントトラフィックが高いSaaS API呼び出し量（1000人超またはバッチジョブ）を生成し、レート・クォータ制限に達するリスクがある。"
    question: "Does agent traffic risk hitting SaaS API rate or quota limits (>1,000 users or heavy batch)?"
    question_ja: "エージェントトラフィックがSaaS APIのレート・クォータ制限に達するリスクがあるか？"

  - id: data_residency
    description: "Data residency or sovereignty regulations restrict where data can be stored or processed."
    description_ja: "データ所在地または主権規制がデータを保存または処理できる場所を制限する。"
    question: "Do data residency or sovereignty regulations restrict where data can be processed?"
    question_ja: "データ所在地または主権規制がデータ処理場所を制限するか？"

  - id: org_chart_maintained
    description: "An authoritative organizational chart is maintained in an IdP or HCM system that can be queried to resolve approvers and roles."
    description_ja: "権限ある組織図がIdPまたはHCMシステムに維持され、承認者と役割を解決するためにクエリできる。"
    question: "Is an authoritative org chart maintained and queryable in an IdP or HCM system?"
    question_ja: "権限ある組織図がIdPまたはHCMシステムで維持・クエリ可能か？"
