  - OB-1
  required_by: []
  applies_when:
  - enterprise_scale
  - roi_justification
  - multi_agent
  - prod_deployment
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 1
  - 2
  - 3
  - 4
  key_technologies:
  - Looker
  - Tableau
  - Power BI
  - OB-1 Observability Lake
  - GV-8 Cost Attribution
  - Salesforce
  - Zendesk
  - Workday
  saas_targets:
  - Salesforce
  - Zendesk
  - Workday
  interfaces:
  - name: Layer 0 Adoption Metrics
    description: Tracks adoption rate, monthly cohort retention, and DAU/MAU stickiness from agent usage logs; feeds change
      management decisions.
  - name: Layer 1 & 2 Business KPI Joiner
    description: Time-series joins agent usage logs with Salesforce lead time, Zendesk CSAT/AHT, and Workday HR KPIs to compute
      business impact.
  - name: ROI Dashboard
    description: Executive-facing report combining cost (GV-8) as denominator and business outcomes as numerator; supports
      investment expand/improve/retire decisions.
  value_kpis:
  - ai_investment_roi_by_use_case
  - executive_dashboard_adoption_pct
  - value_measurement_coverage_pct
- id: ID-1
  name: Workforce/Customer Split
  name_ja: Workforce/Customer 二面分離
  facet: identity
  file: patterns/id-identity/id1-workforce-customer-split.md
  summary: 'Workforce-facing and customer-facing agents are physically and logically separated in IdP, data stores, execution
    environment, and audit paths; cross-boundary data movement defaults to zero and is only allowed through an explicit gate
    with classification, approval, and masking to eliminate the most critical class of data leakage.

    '
  summary_ja: '従業員向けと顧客向けでIdP・データ・エージェント・実行環境・監査を物理的・論理的に完全分離し、面間のデータ移動は原則ゼロ・例外は明示ゲート経由のみとすることで社内データ漏洩を構造的に排除する。

    '
  requires: []
  required_by: []
  applies_when:
  - customer_facing
  - confidential_data
  - enterprise_scale
  not_applicable_when:
  - poc_phase
  - public_data_only
  risk_tiers:
  - 2
  - 3
  - 4
  - 5
  key_technologies:
  - Okta
  - Microsoft Entra ID
  - Google Workspace
  - Auth0
  - Okta Customer Identity (CIAM)
  - Tenant Isolation
  - Namespace Isolation
  - Output Guardrail
  - PII Filter
  - Human Handoff
  saas_targets:
  - Shopify
  - Zendesk
  - Salesforce Service Cloud
  interfaces:
  - name: Dual IdP Boundary
    description: Workforce uses Okta/Entra ID/Google Workspace; customer-facing uses Auth0/Okta CIAM; no identity tokens cross
      the boundary.
  - name: Explicit Cross-Boundary Gate
    description: The only permitted path for data to move from workforce to customer side; enforces classification, approval,
      and KM-6 DLP masking.
  - name: Tenant Isolation
    description: In multi-tenant B2B SaaS, prevents one customer's session context from mixing into another customer's agent
      execution.
  value_kpis:
  - internal_data_leakage_to_customer_channel_incident_count
  - tenant_contamination_incident_count
  - workforce_customer_boundary_audit_coverage_pct
- id: ID-2
  name: Identity Federation & OBO
  name_ja: Identity Federation & On-Behalf-Of（OBO委譲）
  facet: identity
  file: patterns/id-identity/id2-identity-federation-obo.md
  summary: 'Agents obtain per-SaaS delegation tokens scoped to the requester''s own permissions (via direct federation, RFC
    8693 Token Exchange, or ID-4 Permission Mirror for legacy systems), so SaaS native authorization enforces data-level access,
    audit logs record the human principal, and the confused-deputy and omnipotent service-account problems are structurally
    eliminated.

    '
  summary_ja: '依頼者本人の権限に縮退した委譲トークンをSaaSごとに動的取得し、SaaSネイティブ認可でデータレベルを制御する。監査ログに本人を帰責でき、権限集約と混乱代理問題を構造的に解消する。

    '
  requires: []
  required_by:
  - KM-1
  - KM-2
  applies_when:
  - cross_saas
  - audit_required
  - write_operations
  - high_risk_ops
  not_applicable_when:
  - public_data_only
  - autonomous_exec
  - legacy_saas_mix
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - OIDC
  - SAML 2.0
  - SCIM
  - OAuth 2.0 Token Exchange (RFC 8693)
  - Okta
  - Auth0
  - Microsoft Entra ID
  - Google Workspace
  saas_targets:
  - Salesforce
  - ServiceNow
  - Slack
  - Box
  - Google Workspace
  - Microsoft 365
  interfaces:
  - name: Token Broker (Gateway)
    description: At EX-1 Gateway, exchanges the requester's ID token for a per-SaaS OBO token using direct federation (path
      a) or RFC 8693 Token Exchange (path b).
  - name: SaaS Native Authorization (RP)
    description: The target SaaS (Relying Party) applies its own native authorization (Salesforce profiles, ServiceNow ACLs)
      based on the token subject, enforcing data-level permissions.
  - name: Audit Delegation Chain
    description: Records actor (agent) and subject (human) separately in audit logs so each SaaS audit (Salesforce Shield,
      Okta System Log) shows the human principal.
  value_kpis:
  - write_operation_automation_expansion_rate_pct
  - cross_saas_audit_human_attribution_rate_pct
  - confused_deputy_incident_count
- id: ID-3
  name: Workload Agent Identity
  name_ja: Workload / Agent Identity（エージェント自身のID）
  facet: identity
  file: patterns/id-identity/id3-workload-agent-identity.md
  summary: 'Autonomous agents (scheduled batch, webhook-triggered) receive short-lived machine identities (SPIFFE/SVID or
    cloud managed identity) separate from human IDs; all calls are recorded as a dual representation (workload ID + human
    context if present), enabling clear separation of autonomous execution from human-delegated execution in audit logs.

    '
  summary_ja: 'スケジュールバッチやイベントトリガーで自律動作するエージェントに短命のワークロードIDを付与し、人間代理と監査上で分離する。全呼び出しをworkload ID＋人間IDコンテキストの二重表現で記録する。

    '
  requires:
  - ID-5
  - ID-6
  required_by: []
  applies_when:
  - autonomous_exec
  - audit_required
  - kubernetes_cloud
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - SPIFFE/SPIRE
  - SVID (Short-lived Certificate)
  - AWS IAM Roles Anywhere / IRSA
  - Microsoft Entra Workload Identity
  - Google Workload Identity Federation
  - mTLS
  saas_targets: []
  interfaces:
  - name: Workload Certificate Issuer (SPIRE / Cloud IAM)
    description: Issues short-lived SVID certificates or cloud managed identity tokens to agents at startup; auto-rotates
      within TTL.
  - name: Dual Representation Audit Record
    description: Records workload_id as actor and human_id as subject (if present) per call; purely autonomous batches record
      only workload_id with policy/schedule reference.
  - name: Least-Privilege Workload Scope
    description: Each autonomous agent's workload identity carries only the minimum permissions needed for its specific job;
      broader permissions are never inherited.
  value_kpis:
  - autonomous_batch_automation_coverage_pct
  - workload_vs_human_operation_audit_separation_rate_pct
  - unused_workload_identity_count
- id: ID-4
  name: Permission Mirror & Least-of Faithful Access
  name_ja: Permission Mirror & Least-of Faithful Access（権限忠実アクセス）
  facet: identity
  file: patterns/id-identity/id4-permission-mirror-least-of.md
  summary: 'SaaS ACLs are synchronized into an agent-side Permission Mirror; effective permissions are always computed as
    the intersection (agent capability ∩ user entitlement ∩ policy); revocations propagate in near-real time to prevent stale-access
    after departure or transfer; primarily used as pre-filter for RAG and as fallback for OBO-unsupported systems.

    '
  summary_ja: '各SaaSのACLをエージェント基盤側に同期したPermission Mirrorを持ち、実効権限を「エージェント能力∩本人権限∩ポリシー」の最小に縮退させる。RAGの事前フィルタとOBO委譲非対応系の補完が主な役割。

    '
  requires: []
  required_by:
  - KM-1
  applies_when:
  - cross_saas_search
  - frequent_perm_chg
  - legacy_saas_mix
  - confidential_data
  not_applicable_when:
  - public_data_only
  - single_team
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - ACL Sync
  - SCIM Group Sync
  - SaaS Admin API
  - Zanzibar-based ReBAC
  - ABAC
  - PDP (ID-6)
  saas_targets:
  - Salesforce
  - Box
  - Google Drive
  - Confluence
  - Notion
  - Slack
  - ServiceNow
  interfaces:
  - name: ACL Sync Pipeline
    description: Synchronizes SaaS ACLs (Salesforce, Box, Google Drive) into the Permission Mirror; near-real-time for sensitive
      documents, daily for org-wide role changes.
  - name: Effective Permission Calculator
    description: Computes agent_capability ∩ user_entitlement ∩ policy_constraint before each RAG query or tool call; records
      which factor was the limiting constraint in audit.
  - name: Stale-Access Monitor
    description: Detects and alerts when Mirror-to-source divergence exceeds threshold; triggers forced re-sync on departure/transfer
      events.
  value_kpis:
  - unauthorized_document_exposure_via_rag_incident_count
  - stale_access_after_departure_incident_count
  - permission_mirror_sync_lag_seconds
- id: ID-5
  name: JIT Scoped Credentials
  name_ja: JIT Scoped Credentials（最小・短命・用途限定）
  facet: identity
  file: patterns/id-identity/id5-jit-scoped-credentials.md
  summary: 'Long-lived broad-scope API keys are eliminated; immediately before each tool call the agent runtime requests a
    credential from a broker (Vault, AWS STS) specifying purpose, target, and required scope; the returned credential is short-lived
    (minutes), single-use, and tagged with agent ID and purpose for full auditability.

    '
  summary_ja: '長命で広スコープなAPIキーを廃止し、ツール呼び出し直前にVault/STS等のブローカーから用途・対象・有効期間を限定したJITクレデンシャルを都度取得する。漏洩時の被害を数分間・単一リソースに限定する。

    '
  requires:
  - ID-6
  required_by: []
  applies_when:
  - cross_saas
  - high_risk_ops
  - vault_sts_infra
  - audit_required
  not_applicable_when:
  - poc_phase
  - single_team
  - legacy_saas_mix
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - HashiCorp Vault (Dynamic Secrets)
  - AWS STS (AssumeRole / GetSessionToken)
  - Azure Managed Identity / Entra Workload Identity
  - Google Workload Identity Federation
  - OAuth 2.0 Token Exchange (RFC 8693)
  saas_targets:
  - Salesforce
  - ServiceNow
  interfaces:
  - name: Credential Broker
    description: Vault/STS endpoint that issues JIT credentials with explicit scope, TTL, target resource, and agent ID tag;
      validates request against PDP before issuing.
  - name: PDP Pre-Issuance Check
    description: Broker consults ID-6 PDP to confirm the requesting agent is authorized before issuing the credential; sets
      minimum permitted scope.
  - name: Credential Audit Trail
    description: Each issued credential record includes agent_id, purpose, scope, TTL, and target_resource for full forensic
      traceability.
  value_kpis:
  - credential_exposure_window_minutes
  - hardcoded_api_key_incident_count
  - credential_blast_radius_single_resource_pct
- id: ID-6
  name: Zero-Trust PDP/PEP
  name_ja: Zero-Trust Runtime + 中央PDP/分散PEP（ABAC/ReBAC）
  facet: identity
  file: patterns/id-identity/id6-zero-trust-pdp-pep.md
  summary: 'Every agent action is evaluated by a central PDP (OPA/Cedar) with ABAC/ReBAC against subject, resource, context,
    and action attributes drawn from the org graph; distributed PEPs at Gateway, runtime, and connector enforce the decision;
    unknown requests default to deny (fail-closed) per NIST SP 800-207.

    '
  summary_ja: 'すべての行為を毎回中央PDP（OPA/Cedar）でABAC/ReBAC評価し、Gateway・ランタイム・コネクタの分散PEPが結果を強制する。不明はdeny（fail-closed）。組織グラフを属性源とするNIST
    SP 800-207準拠ゼロトラスト認可基盤。

    '
  requires: []
  required_by:
  - GV-4
  - RT-3
  - ID-5
  - IN-1
  applies_when:
  - confidential_data
  - cross_saas
  - regulated_industry
  - multi_agent
  not_applicable_when:
  - poc_phase
  - public_data_only
  risk_tiers:
  - 2
  - 3
  - 4
  - 5
  key_technologies:
  - OPA (Open Policy Agent) / Rego
  - Cedar
  - mTLS
  - Workload Identity (ID-3)
  - Short-lived Token (ID-5)
  - Network Policy
  - Runtime Sandbox
  saas_targets: []
  interfaces:
  - name: Central PDP (OPA/Cedar)
    description: Evaluates every authorization request with ABAC/ReBAC against attributes from the org graph; returns allow/deny/require_approval
      and logs the decision.
  - name: Distributed PEP
    description: PEPs at Gateway (EX-1), runtime, and connector enforce PDP decisions; no enforcement point bypasses the PDP.
  - name: Org Graph Attribute Feed
    description: Supplies department, role, and project attributes to the PDP for contextual evaluation; attribute staleness
      is monitored.
  value_kpis:
  - unauthorized_access_attempt_block_rate_pct
  - pdp_evaluation_latency_ms
  - permission_change_reflection_lag_seconds
- id: ID-7
  name: Policy-as-Code Guardrail
  name_ja: Policy-as-Code Guardrail（決定論的行動可否）
  facet: identity
  file: patterns/id-identity/id7-policy-as-code-guardrail.md
  summary: 'Agent action proposals are passed as structured input to a Policy Engine (OPA/Cedar) that deterministically returns
    allow/deny/require_approval/redact; policies for prohibitions, approval thresholds, and data classification are versioned
    in Git, eliminating prompt-based security that can be bypassed by prompt injection.

    '
  summary_ja: 'エージェントのアクション提案をPolicy Engine（OPA/Cedar）に入力し、allow/deny/require_approval/redactを決定論的に返す。ポリシーはGitで版管理され、プロンプトインジェクションで突破できない実行基盤側のガードレールを実現する。

    '
  requires:
  - ID-6
  required_by:
  - RT-3
  - RT-4
  - GV-4
  applies_when:
  - regulated_industry
  - enterprise_scale
  - multi_agent
  - high_risk_ops
  not_applicable_when:
  - poc_phase
  - public_data_only
  - single_team
  risk_tiers:
  - 2
  - 3
  - 4
  - 5
  key_technologies:
  - OPA (Open Policy Agent) / Rego
  - Cedar
  - PDP/PEP (ID-6)
  - Policy Versioning (GV-6)
  - Git
  - Approval Workflow (RT-4)
  - Industry Policy Pack (GV-4)
  saas_targets: []
  interfaces:
  - name: Structured Policy Input
    description: Agent action proposals are structured into actor, agent, action, resource, data_classification, risk_tier,
      purpose, and project attributes before policy evaluation.
  - name: Policy Engine (OPA/Cedar)
    description: Deterministically evaluates inputs against versioned policy rules; returns allow, deny, require_approval,
      or redact with reason.
  - name: Policy Version & Test Gate
    description: Policy changes are managed in Git with PR review, automated test, and canary before production deployment;
      conflicts between policies are surfaced automatically.
  value_kpis:
  - prompt_injection_bypass_incident_count
  - policy_change_deployment_lead_time_hours
  - deny_reason_audit_coverage_pct
- id: ID-8
  name: Consent & Access Transparency
  name_ja: Consent & Access Transparency（同意・透明化）
  facet: identity
  file: patterns/id-identity/id8-consent-access-transparency.md
  summary: 'Users can view, manage, and immediately revoke the SaaS scopes they have delegated to agents via a consent dashboard;
    explicit delegation consent is obtained at first use or for high-risk operations; consent entries are purpose-bound and
    time-limited, and revocation instantly invalidates tokens to satisfy GDPR consent and right-to-revoke requirements.

    '
  summary_ja: 'ユーザーがエージェントに付与したSaaSアクセススコープを確認・同意・即時取り消しできるダッシュボードを提供する。同意は目的・期限を限定し、取り消しはトークン失効と結合する。GDPR等の同意・取り消し権要件に対応する。

    '
  requires:
  - ID-2
  - ID-4
  - ID-5
  required_by: []
  applies_when:
  - personal_data
  - privacy_regulation
  - adoption_challenge
  not_applicable_when:
  - autonomous_exec
  - poc_phase
  - public_data_only
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - Okta Consent
  - Microsoft Entra ID Admin/User Consent
  - OAuth 2.0 Scope Management
  - RFC 7009 Token Revocation
  - Consent Registry (DB / Policy Store)
  - Internal Consent Portal
  saas_targets: []
  interfaces:
  - name: Consent Screen (IdP / Internal Portal)
    description: At first OBO token issuance or for high-risk operations, presents scope, purpose, and expiry to the user;
      records approval in Consent Registry.
  - name: Consent Registry
    description: Stores per-purpose consent entries (subject, scope, purpose, expiry); PDP checks registry before any delegated
      action proceeds.
  - name: Revocation & Instant Token Invalidation
    description: User revocation in the dashboard immediately invalidates cached tokens via RFC 7009; Gateway re-checks consent
      state on each subsequent call.
  value_kpis:
  - agent_trust_score_user_survey
  - scope_creep_incident_count
  - consent_revocation_propagation_time_seconds
- id: RT-1
  name: Org-Hierarchical Hub & Spoke
  name_ja: 組織階層型ハブ＆スポーク（意図ルーティング＋ドメインスポーク）
  facet: runtime
  file: patterns/rt-runtime/rt1-org-hierarchical-hub-spoke.md
  summary: 'A hub agent routes user intents to domain-specific spoke agents, propagating permissions in an attenuated form
