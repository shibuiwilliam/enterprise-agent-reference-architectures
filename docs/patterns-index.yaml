  - spec_task_inconsistency_detection_lead_time_hours
  - project_context_retrieval_time_seconds
- id: KM-1
  name: Access-Controlled Enterprise RAG
  name_ja: 権限認識RAG（アクセス制御型エンタープライズRAG）
  facet: knowledge
  file: patterns/km-knowledge/km1-access-controlled-rag.md
  summary: 'Each chunk ingested into the vector DB carries the source ACL, data classification, and freshness metadata; at
    query time the requester''s current entitlements are re-evaluated so only permissible documents appear in results, preventing
    ex-employee and transferred-employee leakage.

    '
  summary_ja: '取り込み時に各チャンクにソースのACL・分類・鮮度を同梱し、検索のたびに依頼者の 最新権限で再評価する。退職者・異動者の「見えてはいけないものが見える」問題を防ぎ、 引用付き回答で根拠の透明性を確保する。

    '
  requires:
  - ID-2
  - ID-4
  required_by: []
  applies_when:
  - cross_saas_search
  - frequent_perm_chg
  - confidential_data
  - enterprise_scale
  not_applicable_when:
  - public_data_only
  - real_time_latency
  risk_tiers:
  - 1
  - 2
  - 3
  key_technologies:
  - Hybrid Search (BM25 + Vector)
  - Reranker
  - Pinecone
  - Weaviate
  - Qdrant
  - Elasticsearch
  - Freshness Ranking
  - Citation
  saas_targets:
  - Box
  - Google Drive
  - Notion
  - Confluence
  - SharePoint
  interfaces:
  - name: Ingest Pipeline with ACL Embedding
    description: Embeds source ACL, classification label, and freshness timestamp into each chunk at ingestion time; ACL is
      treated as a reference value for refresh not a fixed copy.
  - name: Permission Filter (ID-4)
    description: Evaluates the requester's current entitlements against chunk ACLs at query time, filtering inaccessible documents
      before ranking.
  - name: Hybrid Search + Reranker
    description: Combines BM25 keyword matching with vector similarity; reranker produces final scored results including freshness
      penalty for stale documents.
  value_kpis:
  - information_search_time_minutes
  - unauthorized_document_exposure_incident_count
  - rag_answer_precision_at_5
- id: KM-2
  name: Access-Controlled Context Mesh
  name_ja: フェデレーテッド文脈メッシュ（アクセス制御型コンテキストメッシュ）
  facet: knowledge
  file: patterns/km-knowledge/km2-context-mesh.md
  summary: 'Rather than aggregating data in one place, a Context Router federates queries to each SaaS Context Provider using
    the requester''s OBO token so that confidential SaaS data is retrieved just-in-time without copying, preserving the original
    permission model.

    '
  summary_ja: '各データ源を一箇所に集約せず、本人のOBOトークンで各SaaSに分散問い合わせして リアルタイムに文脈を取得する。コピーによる権限モデル崩壊を防ぎ、 データ所在地規制への対応もしやすい。

    '
  requires:
  - ID-2
  required_by: []
  applies_when:
  - confidential_data
  - data_residency
  - cross_saas
  - audit_required
  not_applicable_when:
  - public_data_only
  - real_time_latency
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - Federated Search
  - Context Router
  - Retrieval Proxy
  - Embedding Index per Scope
  - JIT Retrieval
  saas_targets:
  - Salesforce
  - Slack
  - Google Drive
  - Jira
  - ServiceNow
  - Notion
  - Workday
  interfaces:
  - name: Context Router
    description: Dispatches queries in parallel to each Context Provider with independent timeouts so one slow provider does
      not block others.
  - name: Context Provider (per SaaS)
    description: Calls the target SaaS with the requester's OBO token (ID-2) and returns only the data the requester is permitted
      to see.
  - name: Context Package Builder
    description: Assembles the collected provider results and passes them through KM-5 purpose policy for final filtering
      before sending to the LLM.
  value_kpis:
  - cross_saas_context_retrieval_latency_ms
  - unauthorized_data_access_incident_count
  - cross_department_insight_utilization_rate
- id: KM-3
  name: Canonical Enterprise Object Model & Knowledge Graph
  name_ja: 正規オブジェクト／知識グラフ
  facet: knowledge
  file: patterns/km-knowledge/km3-canonical-object-knowledge-graph.md
  summary: 'Disparate SaaS entities are normalized to canonical business objects (Customer, Employee, Project, Contract, etc.)
    with entity resolution for cross-system de-duplication; the graph holds reference links only, leaving actual data in source
    SaaS systems.

    '
  summary_ja: '多様なSaaSデータを共通業務オブジェクトに正規化し、エンティティ解決で同一人物・ 同一顧客を名寄せして関係を張る。完全なETL統合ではなく「意味的統合」を目指し、 実データは元の場所に残す。

    '
  requires: []
  required_by: []
  applies_when:
  - multi_department
  - cross_saas
  - enterprise_scale
  not_applicable_when:
  - single_team
  - poc_phase
  risk_tiers:
  - 2
  - 3
  key_technologies:
  - Canonical Data Model
  - GraphRAG
  - Neo4j
  - Master Data Management (MDM)
  - Entity Resolution
  - Sansan
  saas_targets:
  - Salesforce
  - Workday
  - ServiceNow
  - Jira
  - Sansan
  interfaces:
  - name: Entity Resolution Engine
    description: Matches cross-SaaS entities (e.g., Salesforce Account == Workday Organization) using fuzzy matching and ID
      mapping tables; flags low-confidence matches for manual review.
  - name: Knowledge Graph (Neo4j)
    description: Stores reference links and relationship metadata (member-of, owned-by, referenced-by) plus entitlement edges;
      actual data stays in source SaaS.
  - name: Graph Traversal API
    description: Enables agents to navigate related entities and then use KM-2 Context Providers to JIT-fetch actual data
      from source systems.
  value_kpis:
  - cross_system_entity_resolution_accuracy_pct
  - cross_department_kpi_aggregation_time_hours
  - management_decision_data_preparation_time_reduction_pct
- id: KM-4
  name: Scoped Memory Hierarchy
  name_ja: スコープ記憶階層
  facet: knowledge
  file: patterns/km-knowledge/km4-scoped-memory-hierarchy.md
  summary: 'Agent memory is partitioned into Personal, Team, Project, Department, Company, and Customer scopes with access
    governed by the org chart; lifecycle events (project closure, resignation, transfer) automatically expire memory and permissions,
    and individuals retain the right to review and erase their personal memory.

    '
  summary_ja: 'メモリを個人/チーム/プロジェクト/部門/全社/顧客に分離し、共有範囲を組織グラフに 従わせる。退職やプロジェクト終了に連動してメモリと権限を自動失効させ、 本人が自分のメモリを消去できる権利も設計に含める。

    '
  requires: []
  required_by: []
  applies_when:
  - persistent_memory
  - multi_department
  - personal_data
  - project_team
  not_applicable_when:
  - single_team
  - poc_phase
  risk_tiers:
  - 2
  - 3
  key_technologies:
  - Memory Store
  - Vector DB (Namespace isolation)
  - ACL
  - TTL
  - Memory Review UI
  saas_targets:
  - Workday
  - Okta
  interfaces:
  - name: Memory Scope Partitioner
    description: Physically or logically separates memory by scope using Vector DB namespaces or encryption keys; writes pass
      through a classification and duplicate-detection gate.
  - name: Lifecycle Event Handler
    description: Listens for org events (project closed, employee departed, transfer) and triggers memory archive/expiry and
      RBAC group removal automatically.
  - name: Memory Review UI
    description: Allows individuals to inspect, correct, and erase their personal memory scope to satisfy Right to Erasure
      requirements.
  value_kpis:
  - context_reuse_rate_pct
  - knowledge_silo_reduction_score
  - memory_leakage_incident_count
- id: KM-5
  name: Purpose-Bound Context Package
  name_ja: 目的限定コンテキストパッケージ
  facet: knowledge
  file: patterns/km-knowledge/km5-purpose-bound-context.md
  summary: 'Per-business-purpose policies define the minimum data types, source systems, token budget, and TTL allowed in
    a context package; any data outside the permitted classification or purpose is filtered or masked before reaching the
    LLM.

    '
  summary_ja: '業務目的ごとに「必要な最小データ」をポリシーで定義し、トークン予算内のコンテキスト パッケージを生成する。目的に無関係なデータや過剰な情報がLLMに渡ることを防ぎ、 GDPR等のデータ目的外利用禁止要件に対応する。

    '
  requires: []
  required_by: []
  applies_when:
  - multi_purpose_agent
  - confidential_data
  - privacy_regulation
  - personal_data
  not_applicable_when:
  - single_team
  - poc_phase
  - public_data_only
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - OPA (Open Policy Agent)
  - Microsoft Purview
  - Google Cloud DLP
  - AWS Macie
  - Context Builder
  - Token Budget Manager
  saas_targets:
  - Salesforce
  - ServiceNow
  - Box
  interfaces:
  - name: Purpose Policy Store
    description: Stores per-purpose definitions of allowed data types, connected systems, token limits, and TTL; versioned
      and regularly reviewed with data owners.
  - name: Context Builder
    description: Fetches data according to the purpose policy, passes it through DLP/classification checks, applies token
      budget, and attaches version and purpose tags.
  - name: DLP / Classification Filter (KM-6)
    description: Detects and masks or removes any data whose classification is not permitted by the current purpose before
      the package is handed to the LLM.
  value_kpis:
  - context_token_cost_per_request
  - purpose_policy_violation_count
  - llm_answer_precision_improvement_pct
- id: KM-6
  name: DLP & Redaction Boundary
  name_ja: DLP・マスキング境界
  facet: knowledge
  file: patterns/km-knowledge/km6-dlp-redaction-boundary.md
  summary: 'DLP detection and masking or tokenization are applied at all five data boundaries (user input, RAG retrieval,
    tool results, LLM output, and log storage); the highest-classification data is routed to an on-premise or VPC-internal
    inference path rather than external LLM APIs.

    '
  summary_ja: 'LLM・RAG・ツール実行・ログの入出力すべての境界でDLP検出・マスキング・ トークナイゼーションを適用し、PII/シークレット/契約情報の外部送信と ログへの機密データ混入を防ぐ。最高機密は外部LLMへの送信自体を禁止する。

    '
  requires: []
  required_by: []
  applies_when:
  - personal_data
  - external_llm_api
  - privacy_regulation
  - confidential_data
  not_applicable_when:
  - public_data_only
  - real_time_latency
  risk_tiers:
  - 2
  - 3
  - 4
  - 5
  key_technologies:
  - Microsoft Purview
  - Google Cloud DLP / Sensitive Data Protection
  - Presidio (Microsoft OSS)
  - GitGuardian
  - truffleHog
  - HashiCorp Vault Transit Secrets Engine
  - Format-Preserving Encryption (FPE)
  - Fluentd / Logstash masking plugins
  saas_targets:
  - Any external LLM API (Claude, GPT, etc.)
  interfaces:
  - name: Input DLP Gate
    description: Scans user input and RAG chunks for PII and secrets before sending to the LLM; applies masking or tokenization
      and routes highest-classification data to an internal inference path.
  - name: Output DLP Gate
    description: Post-scans LLM output and tool results for residual sensitive data before returning to the user or writing
      to logs.
  - name: Log Filter
    description: Strips PII from log collection pipeline (Fluentd/Logstash) so that audit logs do not contain plaintext sensitive
      data.
  value_kpis:
  - pii_leakage_incident_count
  - dlp_false_positive_rate_pct
  - agent_applicable_scope_expansion_rate
- id: KM-7
  name: Ephemeral Secure Context Bus
  name_ja: 揮発・機密計算コンテキストバス
  facet: knowledge
  file: patterns/km-knowledge/km7-ephemeral-secure-context-bus.md
  summary: 'Context is processed in an isolated inference environment (VPC-hosted or Confidential GPU) and all memory is released
    and zeroed at session end; only metadata and input/output hashes are sent to the observability layer, leaving no plaintext
    residue even in logs.

    '
  summary_ja: 'コンテキストを隔離推論環境で処理し、セッション終了と同時にメモリを解放・ゼロ化する。 ログ基盤にはメタデータと入出力ハッシュのみ送信し、本文を一切残さない。 人事評価・M&A・インサイダー情報など最高機密処理向けの揮発アプローチ。

    '
  requires: []
  required_by: []
  applies_when:
  - top_secret_data
  - privacy_regulation
  - regulated_industry
  not_applicable_when:
  - poc_phase
  - persistent_memory
  - public_data_only
  risk_tiers:
  - 4
  - 5
  key_technologies:
  - Azure OpenAI (VNet integration / private endpoint)
  - AWS Bedrock (VPC endpoint)
  - Azure Confidential VM
  - NVIDIA H100 Confidential Computing (Confidential GPU)
  - AMD SEV-SNP
  - Redis No-Persistence
  - Presidio
  - DPA (Data Processing Agreement)
  saas_targets:
  - Salesforce
  - Workday
  interfaces:
  - name: DLP Proxy
    description: Masks and classifies data collected from source SaaS systems before it enters the isolated inference environment.
  - name: Isolated Inference Environment
    description: VPC-hosted LLM (or Confidential GPU) with learning opt-out; context lives in-memory only and is zeroed immediately
      after the session completes.
  - name: Sealed Audit Metadata Sink
    description: Sends only metadata (latency, token count, cost) and hashed input/output to the observability lake; full
      content is never persisted.
  value_kpis:
  - highest_classification_workflow_automation_coverage_pct
  - sealed_audit_metadata_completeness_pct
  - confidential_processing_latency_ms
- id: IN-1
  name: Enterprise Tool / MCP Gateway
  name_ja: エンタープライズツール／MCPゲートウェイ
  facet: integration
  file: patterns/in-integration/in1-tool-mcp-gateway.md
  summary: 'All tool calls from agents are routed through a centrally managed Tool/MCP Gateway that enforces authentication,
    authorization (PDP/PEP), schema validation, rate control, DLP, idempotency, audit logging, and dry-run in one place; API
    credentials are never exposed to agents.

    '
  summary_ja: 'すべてのツール呼び出しを企業管理のGatewayに集約し、認証・認可・スキーマ検証・ レート制御・DLP・監査・冪等性・ドライランを一箇所で適用する。 APIキーはエージェントに渡さずGateway側のSecret
    Managerが保持する。

    '
  requires:
  - ID-6
  required_by: []
  applies_when:
  - multi_agent
  - cross_saas
  - audit_required
  - enterprise_scale
  not_applicable_when:
  - poc_phase
  - single_team
  - public_data_only
  risk_tiers:
  - 1
  - 2
  - 3
  - 4
  key_technologies:
  - MCP Gateway
  - API Gateway (Kong / Envoy)
  - Tool Registry (JSON Schema)
  - Secret Manager
  - OPA / Cedar (ID-6)
  - Idempotency Key
  saas_targets:
  - Salesforce
  - Workday
  - Slack
  - ServiceNow
  - GitHub
  interfaces:
  - name: Tool Catalog
    description: JSON Schema-based registry managing schema, required permissions, estimated cost, version, and enabled/disabled
      state for each tool.
  - name: Auth / Authz Layer (ID-6 PDP/PEP)
    description: Validates agent identity and evaluates per-tool authorization policy before forwarding the request; credentials
      are held in Secret Manager not passed to agents.
  - name: Audit Recorder
    description: Records every tool invocation with its input, output, actor, agent ID, and correlation ID for cross-system
      tracing.
  value_kpis:
  - new_saas_integration_time_days
  - tool_call_policy_violation_count
  - unauthorized_api_key_exposure_incident_count
- id: IN-2
  name: SaaS Connector Adapter
  name_ja: SaaSコネクタアダプタ（腐敗防止層）
  facet: integration
  file: patterns/in-integration/in2-saas-connector-adapter.md
  summary: 'SaaS-specific API differences (authentication, pagination, rate limits, error formats, data models) are encapsulated
    in per-SaaS adapters that expose a common business-vocabulary interface to agents, so SaaS changes or replacements are
    contained within the adapter.

    '
  summary_ja: '各SaaSの独自API仕様・認証・データモデルを、エージェントが扱う共通インターフェイスに 変換する腐敗防止層。SaaS差し替えや仕様変更の影響をアダプタ内部に閉じ込め、 エージェントには業務語彙だけを見せる。

    '
  requires: []
  required_by: []
  applies_when:
  - cross_saas
  - multi_agent
  - enterprise_scale
  not_applicable_when:
  - single_team
  - poc_phase
  risk_tiers:
  - 1
  - 2
  - 3
  key_technologies:
  - Adapter Pattern
  - Anti-Corruption Layer
  - OpenAPI
  - GraphQL Federation
  - Connector SDK
  - Error Normalization
  saas_targets:
  - Salesforce
  - Workday
  - ServiceNow
  - Slack
  - Google Workspace
  interfaces:
  - name: Canonical Tool Interface
    description: Business-vocabulary API (e.g., get_customer, create_ticket, update_opportunity) that agents use regardless
      of the underlying SaaS.
  - name: SaaS-Specific Adapter
    description: Encapsulates authentication method, pagination, rate limit handling, and error normalization for one SaaS;
      changes to SaaS API are absorbed here.
  - name: Error Normalizer
    description: Converts SaaS-specific error codes into a common error type so agents and orchestrators handle errors uniformly.
  value_kpis:
  - saas_api_change_agent_rework_hours
  - saas_connector_reuse_count
  - integration_defect_rate_per_saas
- id: IN-3
  name: Rate / Quota Broker
  name_ja: レート／クォータ調停ブローカー
  facet: integration
  file: patterns/in-integration/in3-rate-quota-broker.md
  summary: 'A centralized token-bucket broker manages SaaS API quota across all agents, enforces priority queues (interactive
    > batch) with per-tenant fairness caps, and handles 429 retries centrally with exponential back-off to prevent retry storms
    from individual agents.

    '
  summary_ja: 'SaaS APIレート上限をトークンバケット型ブローカーで集中管理し、対話（優先高）と バッチ（優先低）で公平に枠を配分する。429発生時はBrokerが集中リトライし、 個々のエージェントが独自にリトライするリトライストームを防ぐ。

    '
  requires: []
  required_by: []
  applies_when:
  - high_api_volume
  - enterprise_scale
  - async_processing
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 1
  - 2
  - 3
  key_technologies:
  - Redis (Lua atomic bucket operations)
  - Envoy Rate Limit Service
  - Kong Rate Limiting Plugin
  - Apigee Quota Policy
  - RabbitMQ Priority Queue
  - Redis Sorted Set
  saas_targets:
  - Salesforce
  - ServiceNow
  - Slack
  interfaces:
  - name: Token Bucket per SaaS
    description: Per-SaaS bucket with configurable burst capacity, refill rate, and per-tenant maximum share; approaching
      exhaustion triggers back-pressure to upstream agents.
  - name: Priority Queue
    description: Separates interactive (high priority) and batch (low priority) requests; batch is scheduled to off-peak hours
      when quota is constrained.
  - name: Centralized Retry Handler
    description: Absorbs 429 responses from SaaS APIs and retries with exponential back-off plus jitter; individual agents
      receive only back-pressure signals, never raw 429s.
  value_kpis:
  - interactive_agent_sla_compliance_pct
  - saas_api_throttling_incident_count
  - batch_off_peak_execution_rate_pct
- id: IN-4
  name: Existing iPaaS Reuse
  name_ja: 既存iPaaS資産再利用
  facet: integration
  file: patterns/in-integration/in4-existing-ipaas-reuse.md
  summary: 'Instead of rebuilding SaaS integrations from scratch, existing iPaaS flows (MuleSoft, Workato, Boomi, ESB) are
    wrapped with thin MCP adapters and called through the Tool Gateway; only net-new integrations are built as native MCP
    servers, preventing duplicate maintenance.

    '
  summary_ja: 'エージェント導入のたびにSaaS統合をゼロから作り直さず、既存iPaaSを薄いMCPアダプタで ラップしてTool Gateway経由で呼び出す。新規統合のみMCPで追加するハイブリッド構成で 重複投資と保守分散を防ぐ。

    '
  requires:
  - IN-1
  required_by: []
  applies_when:
  - existing_ipaas
  - cross_saas
  - enterprise_scale
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 1
  - 2
  - 3
  key_technologies:
  - MuleSoft Anypoint Platform
  - Workato
  - Boomi AtomSphere
  - Apache Camel / IBM MQ
  - Apigee / Kong
  - MCP Adapter (thin wrapper)
  saas_targets:
  - Salesforce
  - ServiceNow
  - ERP (SAP, Oracle)
  - On-premise systems
  interfaces:
  - name: MCP Adapter (iPaaS Wrapper)
    description: Thin translation layer that converts MCP tool-call format to the iPaaS API or webhook trigger; all business
      logic remains inside the iPaaS flow.
  - name: iPaaS Flow (existing)
    description: Existing integration flow with its connection config, transformation logic, error handling, and monitoring
      retained as-is.
  - name: Contract Test Suite
    description: Consumer-driven contract tests on the MCP adapter to auto-detect when iPaaS flow changes break the agent-facing
      interface.
  value_kpis:
  - integration_build_cost_vs_greenfield_pct
  - duplicate_maintenance_surface_count
  - time_to_first_agent_integration_days
- id: OB-1
  name: Enterprise Agent Observability Lake
  name_ja: エンタープライズエージェント観測基盤（Observability Lake）
  facet: observability
  file: patterns/ob-observability/ob1-observability-lake.md
  summary: 'A three-layer observability store captures every agent execution: metadata (Trace DB), full content (encrypted
    object storage, PII-masked), and aggregated metrics (DWH); instrumented with OpenTelemetry GenAI semantic conventions
    it enables incident investigation, quality improvement, and cost chargeback.

    '
  summary_ja: '実行ログ・トレース・コスト・ツール呼び出し・取得文脈・承認・評価結果を三層に分離して 統合する観測基盤。メタデータはTrace DB、本文はPIIマスキング済み暗号化ストレージ、 集計指標はDWH。OpenTelemetry
    GenAI semantic conventionsに準拠する。

    '
  requires: []
  required_by:
  - GV-7
  - GV-9
  - GV-6
  applies_when:
  - prod_deployment
  - enterprise_scale
  not_applicable_when: []
  risk_tiers:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  key_technologies:
  - OpenTelemetry (GenAI semantic conventions)
  - Jaeger
  - Tempo
  - Datadog APM
  - S3 (encrypted)
  - GCS
  - BigQuery
  - Snowflake
  - Redshift
  - Grafana
  - Prompt Store + Replay Tool
  saas_targets: []
  interfaces:
  - name: OTel Instrumentation Layer
    description: Records run_id, session_id, user_id, agent_id, model, prompt_version, tool_calls, retrieved_context, approval_status,
      token_usage, cost, latency, error, and risk_tier per execution using OpenTelemetry GenAI conventions.
  - name: Three-Layer Storage
    description: Layer 1 (Trace DB) for fast metadata queries; Layer 2 (encrypted object store, PII-masked) for full content
      keyed by run_id; Layer 3 (DWH) for quality scores and ROI aggregations.
  - name: Replay Tool
    description: Reconstructs past executions from stored metadata and content for incident investigation and quality regression
      testing.
  value_kpis:
  - mean_time_to_root_cause_hours
  - agent_quality_improvement_cycle_days
  - cost_per_agent_run_usd
- id: OB-2
  name: Unified Audit & Lineage
  name_ja: 統一監査台帳・系統追跡（三者帰責）
  facet: observability
  file: patterns/ob-observability/ob2-unified-audit-lineage.md
  summary: 'Every agent action is recorded immutably as a triple of principal (human), workload (agent), and target system;
    OpenTelemetry correlation IDs link internal agent audit records with each SaaS audit log (Salesforce Shield, Okta System
    Log, etc.) to enable full incident replay and regulatory reporting.

    '
  summary_ja: 'すべてのエージェント行為を人＋エージェント＋対象システムの三者で改ざん不能に記録する。 相関IDでエージェント内監査と各SaaS監査ログを一本化し、インシデント時のリプレイと 規制当局への報告に対応する統一監査基盤。

    '
  requires:
  - GV-1
  - RT-8
  required_by:
  - GV-9
  applies_when:
  - prod_deployment
  - audit_required
  - regulated_industry
  not_applicable_when: []
  risk_tiers:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  key_technologies:
  - Splunk
  - Microsoft Sentinel
  - Salesforce Shield
  - Google Workspace Audit
  - Okta System Log
  - OpenTelemetry Trace ID / Span ID
  - Event Store (append-only / WORM)
  saas_targets:
  - Salesforce
  - Google Workspace
  - Okta
  interfaces:
  - name: Three-Party Audit Record
    description: Appends principal (human ID), workload (agent ID), tool/system, input/output hashes, policy decision (allow/deny/require_approval),
      delegation chain, and cost to an append-only immutable log per action.
  - name: Correlation ID Stitcher
    description: Uses OpenTelemetry Trace ID / Span ID to join agent-side audit records with SaaS-side audit logs (Salesforce
      Shield, Okta System Log) enabling cross-system investigation.
  - name: SIEM Integration
    description: Forwards normalized audit events to Splunk or Microsoft Sentinel so that agent actions appear alongside human
      actions in the same correlation queries.
  value_kpis:
  - regulatory_audit_preparation_time_hours
  - incident_root_cause_time_to_identify_hours
  - audit_log_completeness_pct
