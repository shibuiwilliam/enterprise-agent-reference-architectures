  - Microsoft Entra
  interfaces:
  - name: Orchestrator
    description: Drives the workflow according to the RACI matrix, recording each phase start/end in the decision log in real
      time.
  - name: Decision Log
    description: Structured log (OpenTelemetry) that records which role (R/A/C/I) performed which action and when.
  - name: Approval Gate
    description: Prevents progression to the next phase until the Accountable human provides approval.
  value_kpis:
  - cross_department_workflow_lead_time_hours
  - decision_accountability_rate_pct
  - compliance_audit_preparation_time_hours
- id: RT-3
  name: Risk-Tiered Autonomy
  name_ja: リスク段階型自律度（自律度の階層）
  facet: runtime
  file: patterns/rt-runtime/rt3-risk-tiered-autonomy.md
  summary: 'Operations are classified into Tier 0–5 risk levels; each tier enforces a corresponding autonomy level from fully
    automatic execution to prohibited operations requiring dual authorization.

    '
  summary_ja: '操作のリスクをTier 0（読み取り専用・完全自動）からTier 5（禁止）まで段階化し、 ポリシーエンジン側で自律度を強制する。低リスクを自動化しつつ高リスクに人間判断を残す。

    '
  requires:
  - ID-7
  required_by: []
  applies_when:
  - write_operations
  - high_risk_ops
  - enterprise_scale
  - multi_department
  not_applicable_when:
  - poc_phase
  - public_data_only
  risk_tiers:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  key_technologies:
  - OPA (Open Policy Agent)
  - Cedar
  - Risk Scoring Engine
  - Microsoft Purview
  - Varonis
  saas_targets:
  - Salesforce
  - Workday
  interfaces:
  - name: Risk Scoring Engine
    description: Calculates the risk tier dynamically from operation attributes, data classification, irreversibility, and
      affected scope.
  - name: Policy Engine (ID-7)
    description: Enforces the tier decision at the execution infrastructure level, preventing agents from self-reporting their
      own tier.
  - name: Approval Workflow (RT-4)
    description: Triggered for Tier 3–4 operations to route to human approval before execution proceeds.
  value_kpis:
  - automation_rate_by_tier_pct
  - high_risk_operation_approval_latency_hours
  - tier5_block_incident_count
- id: RT-4
  name: Human Approval Chain
  name_ja: 組織解決型承認チェーン
  facet: runtime
  file: patterns/rt-runtime/rt4-human-approval-chain.md
  summary: 'Approvers are dynamically resolved from the org chart rather than hard-coded, and approval workflows are delivered
    through existing tools (Slack, ServiceNow) with SLA timers, delegation, and escalation.

    '
  summary_ja: '承認者を組織図から動的に解決し、既存ワークフローツールで承認チェーンを完結させる。 SLAタイマー・委譲・エスカレーション・否決理由フィードバックまで含めて設計する。

    '
  requires:
  - RT-8
  - ID-7
  required_by: []
  applies_when:
  - high_risk_ops
  - hitl_approval
  - org_chart_maintained
  - write_operations
  not_applicable_when:
  - real_time_latency
  - poc_phase
  risk_tiers:
  - 3
  - 4
  key_technologies:
  - Temporal
  - AWS Step Functions
  - Workday HCM
  - Microsoft Entra
  - Slack Block Kit
  - ServiceNow
  - OpenTelemetry
  saas_targets:
  - Workday
  - Slack
  - ServiceNow
  - Microsoft Entra
  interfaces:
  - name: Approver Resolution Engine
    description: Queries the org chart API to dynamically identify the correct approver (line manager, cost owner, data owner)
      per request type and risk tier.
  - name: Workflow Tool Notification
    description: Sends approval requests with action buttons to Slack or ServiceNow tasks so approvers can act within familiar
      tools.
  - name: Decision Log
    description: Records the approver identity, decision (approve/deny/delegate), reason, and timestamp for internal control
      evidence.
  value_kpis:
  - approval_lead_time_hours
  - approval_routing_error_rate_pct
  - escalation_rate_pct
- id: RT-5
  name: Intent-to-Enterprise Command Envelope
  name_ja: 構造化コマンド封筒（意図→エンタープライズコマンド変換）
  facet: runtime
  file: patterns/rt-runtime/rt5-command-envelope.md
  summary: 'Natural language intent is converted into a structured Command Envelope (actor, agent, target_system, action,
    risk_tier, requires_approval, reason) that serves as a stable contract between agents, policy checks, approval workflows,
    and SaaS adapters.

    '
  summary_ja: '自然言語をactor・agent・target_system・action・risk_tier等を含む構造化コマンドへ 変換し、ポリシーチェック・承認・SaaSアダプタに一貫したインターフェースを提供する。 LLMの不確定性をEnvelopeというバリアで止める。

    '
  requires: []
  required_by: []
  applies_when:
  - cross_saas
  - write_operations
  - audit_required
  - multi_agent
  not_applicable_when:
  - poc_phase
  - public_data_only
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - JSON Schema
  - Command Bus
  - DDD Command Pattern
  - OPA
  - Cedar
  saas_targets:
  - Salesforce
  - Workday
  - Slack
  - Google Calendar
  interfaces:
  - name: Intent Parser + Entity Extractor
    description: LLM interprets natural language and extracts entities to produce a validated Command Envelope JSON object.
  - name: Policy Engine (ID-7)
    description: Evaluates the Envelope fields including actor permissions, risk_tier, and target_system combination independently
      of agent self-reporting.
  - name: SaaS Adapter (IN-2)
    description: Receives the approved Envelope and translates it into the target SaaS API call, shielding agents from SaaS-specific
      schemas.
  value_kpis:
  - write_automation_expansion_rate_pct
  - policy_violation_rate_per_1000_operations
  - audit_reconstruction_success_rate_pct
- id: RT-6
  name: System-of-Record Write Boundary
  name_ja: 基幹システム書き込み境界
  facet: runtime
  file: patterns/rt-runtime/rt6-sor-write-boundary.md
  summary: 'Agents never write directly to Systems of Record; instead they submit Command Envelopes to a domain service that
    enforces validation, authorization, and business rules before committing to the SoR.

    '
  summary_ja: 'エージェントはSoRに直接書き込まず、Command EnvelopeをドメインサービスにPassし、 バリデーション・認可・ビジネスルール適用・トランザクション管理をドメインサービス側で完結させる。 下書きはSoEに留め、人間確認後にSoRへ昇格する。

    '
  requires:
  - RT-5
  required_by: []
  applies_when:
  - sor_writes
  - sox_internal_ctrl
  - multi_agent
  - audit_required
  not_applicable_when:
  - real_time_latency
  - public_data_only
  risk_tiers:
  - 3
  - 4
  key_technologies:
  - DDD Domain Service
  - Command Handler
  - JSON Schema Validation
  - Immutable Audit Log
  saas_targets:
  - Workday
  - Salesforce
  - Shopify
  - Slack
  - Notion
  interfaces:
  - name: Domain Service
    description: Single write path that enforces validation, authorization check (ID-4/ID-7), and business rules before executing
      the SoR transaction.
  - name: SoE Draft Store
    description: Holds agent-generated proposals (Slack/Notion/email) for human review before escalation to the domain service.
  - name: Audit Trail
    description: Records before/after values, operator identity, and timestamp as an immutable log for internal control evidence.
  value_kpis:
  - sor_data_integrity_incident_count
  - last_mile_manual_transcription_hours_saved
  - audit_trail_completeness_pct
- id: RT-7
  name: Enterprise Saga Agent
  name_ja: エンタープライズSagaエージェント（補償トランザクション）
  facet: runtime
  file: patterns/rt-runtime/rt7-enterprise-saga.md
  summary: 'Multi-SaaS side-effect workflows are designed using the Saga pattern; each step commits locally with an idempotency
    key and, on failure, compensation actions are executed in reverse order to recover consistency.

    '
  summary_ja: '複数SaaSをまたぐ副作用処理をSagaパターンで設計し、各ステップに補償アクションを 持たせる。分散トランザクション（2PC）が使えないSaaS環境で冪等性キーと補償で整合性を保つ。 補償はベストエフォートであり不可逆ステップはSagaの後段に配置する。

    '
  requires:
  - RT-8
  required_by: []
  applies_when:
  - multi_saas_saga
  - cross_saas
  - write_operations
  - async_processing
  not_applicable_when:
  - single_team
  - real_time_latency
  risk_tiers:
  - 3
  - 4
  key_technologies:
  - Temporal
  - AWS Step Functions
  - Azure Durable Functions
  - Outbox Pattern
  - UUIDv4 Idempotency Key
  - PostgreSQL
  - DynamoDB
  saas_targets:
  - Salesforce
  - Jira
  - Slack
  - ServiceNow
  interfaces:
  - name: Saga Orchestrator
    description: Drives step execution, persists progress state durably, and triggers the compensation sequence in reverse
      order on failure.
  - name: Idempotency Key Manager
    description: Issues a unique key per step to prevent duplicate execution on retry; distinct from session IDs.
  - name: Compensation Action Library
    description: Deterministic code (Temporal Activity etc.) implementing the rollback logic for each step without delegating
      decisions to the LLM.
  value_kpis:
  - multi_saas_transaction_success_rate_pct
  - manual_reconciliation_hours_eliminated
  - compensation_success_rate_pct
- id: RT-8
  name: Durable Enterprise Agent Workflow
  name_ja: 永続エンタープライズエージェントワークフロー
  facet: runtime
  file: patterns/rt-runtime/rt8-durable-workflow.md
  summary: 'Long-running agent processes lasting minutes to hours persist state at each step boundary so that worker crashes,
    restarts, and scale-out events do not lose execution progress; LLM outputs are fixed at activity boundaries and not re-invoked
    on replay.

    '
  summary_ja: '分単位から時間単位の長時間エージェント処理を、ワーカー障害・承認待機・再起動を跨いで 継続できる永続ワークフローとして設計する。LLMの出力はアクティビティ境界で固定し、 リプレイ時に再呼び出ししない。

    '
  requires:
  - OB-1
  required_by:
  - RT-4
  - RT-7
  - OB-2
  applies_when:
  - long_running
  - hitl_approval
  - audit_required
  - regulated_industry
  not_applicable_when:
  - real_time_latency
  - poc_phase
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - Temporal
  - AWS Step Functions
  - Azure Durable Functions
  - LangGraph Persistence
  - SQS
  - Azure Service Bus
  - RabbitMQ
  saas_targets:
  - Slack
  - ServiceNow
  interfaces:
  - name: Workflow Definition (State Machine)
    description: Explicitly defined state transitions where each state is triggered by events; activity boundary results are
      persisted to the durable store.
  - name: Activity Function
    description: Wraps LLM calls and external API calls; implements idempotent execution and stores results in workflow history
      to avoid re-invocation on replay.
  - name: Budget / Step Limit Guard
    description: Enforces maximum step count, execution time, and cost limits in the workflow definition; triggers safe termination
      on breach.
  value_kpis:
  - workflow_completion_rate_pct
  - sla_compliance_rate_pct
  - human_intervention_for_crashed_workflows_count
- id: RT-9
  name: Enterprise Work Queue Agent
  name_ja: エンタープライズ業務キュー参加エージェント
  facet: runtime
  file: patterns/rt-runtime/rt9-work-queue-agent.md
  summary: 'Agents participate as workers in existing ITSM queues (ServiceNow, Zendesk, Jira) alongside humans, processing
    tickets autonomously when capable and escalating with a documented handoff when not.

    '
  summary_ja: 'エージェントを「チャットボット」ではなく「業務キューのワーカー」として設計し、 人間と同じキューから処理を試み、できないタスクはコメント付きでエスカレーションする。 既存のSLA管理・負荷分散・優先度付けはキュー基盤に委ねる。

    '
  requires: []
  required_by: []
  applies_when:
  - itsm_queue
  - enterprise_scale
  - async_processing
  not_applicable_when:
  - single_team
  - real_time_latency
  risk_tiers:
  - 1
  - 2
  - 3
  key_technologies:
  - ServiceNow
  - Zendesk
  - Jira Service Management
  - LangGraph
  - LangChain Agents
  saas_targets:
  - ServiceNow
  - Zendesk
  - Jira Service Management
  - Slack
  interfaces:
  - name: Queue Consumer
    description: Agent subscribes to the same queue as human operators with identical SLA rules and priority routing.
  - name: Escalation Handler
    description: Evaluates whether a task is within scope; if not, documents findings and attempts to date in ticket comments
      before reassigning to a human.
  - name: SLA Monitor
    description: Triggers automatic escalation to a human when SLA remaining time falls below threshold or processing cannot
      proceed.
  value_kpis:
  - ticket_auto_resolution_rate_pct
  - sla_compliance_rate_pct
  - escalation_rate_pct
  - agent_processing_throughput_tickets_per_hour
- id: RT-10
  name: Event-Driven Enterprise Orchestrator
  name_ja: イベント駆動エンタープライズオーケストレーター
  facet: runtime
  file: patterns/rt-runtime/rt10-event-driven-orchestrator.md
  summary: 'Agents autonomously start when SaaS or internal system events arrive on an event bus, completing multi-system
    back-end workflows without waiting for human invocation; debouncing, HMAC verification, rate limits, and HitL approval
    for high-risk steps are mandatory safeguards.

    '
  summary_ja: 'SaaSや社内システムのイベントをトリガーにエージェントを自律起動し、複数システムにまたがる 処理をバックエンドで完結させる。デバウンス・HMAC検証・レートリミット・高リスク操作への HitL承認が必須の安全装置となる。

    '
  requires:
  - RT-7
  - RT-8
  required_by: []
  applies_when:
  - event_driven
  - async_processing
  - cross_saas
  - autonomous_exec
  not_applicable_when:
  - real_time_latency
  - single_team
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - Amazon EventBridge
  - Google Pub/Sub
  - Azure Service Bus
  - Apache Kafka
  - CloudEvents
  - Debezium
  - Temporal
  - Workato
  - MuleSoft
  saas_targets:
  - Workday
  - Salesforce
  - GitHub
  - PagerDuty
  - Slack
  - ServiceNow
  - Okta
  interfaces:
  - name: Event Gateway
    description: Validates incoming webhooks via HMAC signature, source IP allowlist, and CloudEvents source field before
      routing to the orchestrator.
  - name: Debounce / Rate Limiter
    description: Collapses duplicate events for the same entity within a short window and enforces a maximum concurrent workflow
      launch rate.
  - name: Durable Workflow Engine (RT-8)
    description: Manages long-running post-event processing with crash resilience and HitL approval integration.
  value_kpis:
  - process_lead_time_reduction_pct
  - manual_handoff_steps_eliminated_count
  - event_storm_incident_count
- id: RT-11
  name: Project Workspace / Digital Twin Agent
  name_ja: プロジェクト・デジタルツインエージェント
  facet: runtime
  file: patterns/rt-runtime/rt11-project-digital-twin.md
  summary: 'An agent is provisioned per project as a shared team member with a dynamic-RBAC workspace (GraphRAG, Slack channel,
    task board, decision log), provides on-demand context to any member, and expires all memory and permissions automatically
    on project closure.

    '
  summary_ja: 'エージェントを個人ではなくプロジェクト・チームに紐付け、GraphRAGベースの共有メモリ・ Slackチャンネル・Jiraボード・意思決定ログを動的RBACワークスペースとして共有する。 プロジェクト終了時にメモリと権限を自動で失効させる。

    '
  requires:
  - KM-1
  - KM-4
  - ID-4
  required_by: []
  applies_when:
  - project_team
  - cross_saas_search
  - persistent_memory
  - frequent_perm_chg
  not_applicable_when:
  - single_team
  - poc_phase
  risk_tiers:
  - 2
  - 3
  key_technologies:
  - Neo4j (GraphRAG)
  - Slack Bot
  - Dynamic RBAC (Okta Groups / Azure AD Groups)
  - PostgreSQL Decision Log
  - Asana API
  - Jira REST API
  - Box API
  - SharePoint
  saas_targets:
  - Slack
  - Jira
  - Box
  - Asana
  - Notion
  - SharePoint
  interfaces:
  - name: Project Workspace Provisioner
    description: On project creation, auto-provisions Slack channel, Jira board, Box folder, and dynamic RBAC group; auto-deprovisions
      all on project closure.
  - name: GraphRAG Memory
    description: Maintains a knowledge graph of people, decisions, artifacts, and tasks within the project, filtered by each
      member's RBAC permissions at read time.
  - name: Decision Log Store
    description: Structured record of decisions made, rejected alternatives, and rationale for retrospective and audit use.
  value_kpis:
