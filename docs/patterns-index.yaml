# patterns-index.yaml — Machine-readable index of all 45 architecture patterns
# This file is the structured entry point for coding agents.

patterns:
- id: EX-1
  name: Enterprise Agent Gateway
  name_ja: Enterprise Agent Gateway（統一フロントドア）
  facet: experience
  file: patterns/ex-experience/ex1-enterprise-agent-gateway.md
  summary: 'A single entry point through which all agent requests pass, applying authentication, intent classification, risk
    assessment, rate control, and audit entry in one place regardless of channel (Slack, Web, SaaS embedded, API), ensuring
    consistent governance quality even as channels increase.

    '
  summary_ja: 'すべてのエージェント要求が通る単一入口で認証・分類・リスク判定・レート制御・監査エントリを 一元適用する。チャネル（Slack/Web/SaaS埋め込み/API）が増えてもセキュリティと統制品質が下がらず、バースト吸収も担う。

    '
  requires:
  - ID-1
  - ID-2
  - ID-6
  required_by: []
  applies_when:
  - enterprise_scale
  - multi_channel
  - audit_required
  - customer_facing
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 1
  - 2
  - 3
  - 4
  key_technologies:
  - Kong
  - Apigee
  - AWS API Gateway
  - OIDC
  - SAML 2.0
  - Risk Scoring
  - OpenTelemetry Trace ID
  - Token Bucket
  saas_targets:
  - Slack
  - Salesforce
  - ServiceNow
  interfaces:
  - name: Authentication & Risk Classification
    description: Validates OIDC/SAML identity tokens, classifies request intent and risk tier, and assigns a correlation ID
      before forwarding to the backend runtime.
  - name: Rate Control & Burst Absorption
    description: Token-bucket rate limiter that absorbs enterprise-wide peak bursts and coordinates with IN-3 Rate/Quota Broker
      for SaaS-side quota limits.
  - name: Audit Entry Point
    description: Emits a structured audit record per request (actor ID, channel, intent, risk tier, correlation ID) to OB-1
      Observability Lake.
  value_kpis:
  - shadow_ai_incident_count
  - channel_governance_gap_count
  - peak_burst_sla_breach_count
- id: EX-2
  name: Embedded Workbench Channel Placement
  name_ja: 業務埋め込み＋独立ワークベンチ（チャネル配置）
  facet: experience
  file: patterns/ex-experience/ex2-embedded-vs-portal.md
  summary: 'Short daily tasks are served through embeddings in existing business tools (Slack, Teams, Salesforce), while cross-system
    investigation, long-running jobs, and approval flows are served through a standalone workbench that shows plan, progress,
    evidence, approval, and diff on a single screen; both share the same EX-1 Gateway and backend runtime.

    '
  summary_ja: '日常の短い問い合わせは業務ツール（Slack・Teams・Salesforce）に埋め込み、横断調査・長時間タスク・承認フローは計画・根拠・承認・差分を一画面で確認できる独立ワークベンチで提供する。両者は同一の EX-1
    Gateway とバックエンドを共有する。

    '
  requires:
  - EX-1
  - EX-3
  required_by: []
  applies_when:
  - multi_channel
  - enterprise_scale
  - long_running
  - hitl_approval
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 1
  - 2
  - 3
  key_technologies:
  - Slack Bolt SDK
  - Block Kit
  - Microsoft Bot Framework
  - Adaptive Cards
  - Lightning Web Components (LWC)
  - Salesforce Embedded Service
  - ServiceNow Service Portal Widget
  - React/Vue SPA
  - Server-Sent Events (SSE)
  saas_targets:
  - Slack
  - Microsoft Teams
  - Salesforce
  - ServiceNow
  interfaces:
  - name: Embedded UI (Business Tool)
    description: Lightweight widget injected into Slack, Teams, or Salesforce that inherits the current business context and
      submits requests to EX-1 Gateway.
  - name: Standalone Workbench
    description: React/Vue SPA providing streaming progress, approval actions, and diff view for long-running or cross-system
      tasks.
  - name: Channel Adapter
    description: Normalizes each platform's event format and forwards to EX-1 Gateway; absorbs UI differences so the backend
      remains channel-agnostic.
  value_kpis:
  - agent_adoption_rate_pct
  - daily_active_user_retention_rate_pct
  - context_switch_overhead_reduction_minutes
- id: EX-3
  name: Channel-Agnostic Frontdoor
  name_ja: チャネル非依存フロントドア
  facet: experience
  file: patterns/ex-experience/ex3-channel-agnostic-frontdoor.md
  summary: 'Channel adapters normalize input differences from Slack, Teams, Web, and Mobile so that the backend execution
    path, permission checks, and audit logs are identical for every channel; sessions can continue across channels (e.g.,
    start on Slack, resume on Web).

    '
  summary_ja: 'チャネルアダプターが Slack・Teams・Web・モバイルの入力差を吸収し、その先はどのチャネルでも 同一の実行パス・権限チェック・監査ログを通る。セッションはチャネルをまたいで継続でき、チャネル追加の限界コストを下げる。

    '
  requires:
  - EX-1
  - ID-2
  required_by: []
  applies_when:
  - multi_channel
  - audit_required
  - enterprise_scale
  not_applicable_when:
  - single_team
  - poc_phase
  risk_tiers:
  - 1
  - 2
  - 3
  key_technologies:
  - Slack Bolt SDK
  - Bot Framework (Teams)
  - REST/gRPC Adapter
  - Redis Session Store
  - JWT Session Claims
  - OIDC Federation
  saas_targets:
  - Slack
  - Microsoft Teams
  interfaces:
  - name: Channel Adapter
    description: Converts channel-specific authentication tokens to a unified identity, normalizes input format, and forwards
      with a unified session ID to EX-1 Gateway.
  - name: Unified Session Store
    description: Redis-backed session store that enables cross-channel session continuity; session handoff requires re-authentication
      or signature verification.
  - name: Unified Audit Logger
    description: Ensures cross-channel operations appear in a single audit trail (OB-2), preventing session fragmentation
      from hiding activity.
  value_kpis:
  - new_channel_backend_modification_time_hours
  - cross_channel_session_continuity_rate_pct
  - security_gap_per_channel_count
- id: EX-4
  name: Trust & Value UX
  name_ja: 信頼と価値実感のUX（定着を支える体験設計）
  facet: experience
  file: patterns/ex-experience/ex4-trust-value-ux.md
  summary: 'Agent output is accompanied by source citations, confidence labels, and freshness timestamps; high-risk operations
    require staged confirmation; progress is displayed in real time; and completed tasks show estimated time savings to build
    user trust and sustain adoption.

    '
  summary_ja: 'エージェントの出力に根拠と確信度を付与し、高リスク操作は段階的確認を求め、リアルタイム進捗を表示し、節約時間を即座にフィードバックすることで利用者の信頼を獲得し定着率を高める体験パターン。

    '
  requires:
  - EX-1
  - KM-1
  - RT-3
  required_by: []
  applies_when:
  - enterprise_scale
  - adoption_challenge
  - prod_deployment
  not_applicable_when:
  - poc_phase
  - autonomous_exec
  risk_tiers:
  - 1
  - 2
  - 3
  key_technologies:
  - RAG Source Tracking (KM-1)
  - LLM Log Probabilities
  - Source Consistency Check
  - WebSocket Streaming
  - Usage Metrics Collection (OB-1)
  - A/B Testing Infrastructure
  saas_targets: []
  interfaces:
  - name: Citation & Confidence Layer
    description: Attaches source document links, confidence labels (high/estimated/insufficient), and freshness timestamps
      to agent responses using KM-1 retrieval metadata.
  - name: Progressive Confirmation UI
    description: For RT-3 Tier-2+ operations, presents operation details before execution and requests user modification or
      approval.
  - name: Value Feedback Dashboard
    description: Displays estimated time saved per completed task and cumulative weekly/monthly savings, tied to GV-10 measurement
      data.
  value_kpis:
  - agent_adoption_rate_pct
  - agent_retention_dau_mau_ratio
  - user_trust_score_nps
- id: GV-1
  name: Enterprise Agent Control Plane
  name_ja: Enterprise Agent Control Plane（レジストリ／ライフサイクル）
  facet: governance
  file: patterns/gv-governance/gv1-agent-control-plane.md
  summary: 'All agents are registered with owner, purpose, data scope, risk tier, and approval policy; lifecycle from application
    through review, publication, versioning, and retirement is centrally managed; unregistered agents are blocked at the gateway
    so shadow AI cannot run.

    '
  summary_ja: '社内の全エージェントを所有者・目的・データ範囲・リスク階層とともに登録し、審査・版管理・廃止まで 一元管理する制御プレーン。未登録エージェントはゲートウェイで遮断し野良エージェントの増殖を止める。

    '
  requires:
  - ID-7
  required_by:
  - GV-2
  - GV-8
  - OB-2
  applies_when:
  - multi_department
  - enterprise_scale
  - audit_required
  - prod_deployment
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - Agent Registry
  - ServiceNow CMDB Extension
  - Policy-as-Code (ID-7)
  - Model Gateway (GV-5)
  saas_targets:
  - ServiceNow
  interfaces:
  - name: Agent Registry
    description: Stores per-agent attributes (owner, business_purpose, allowed_tools, data_domains, risk_tier, approval_policy,
      cost_budget) with versioning and lifecycle state.
  - name: Lifecycle Review Gate
    description: Routes new and changed agent registrations through security, legal, and data protection review; adjusts review
      depth by risk tier.
  - name: Execution Enforcement
    description: Connects to Model Gateway (GV-5) and Agent Gateway (EX-1) so unregistered agents are physically blocked from
      executing.
  value_kpis:
  - shadow_ai_agent_count
  - agent_owner_identification_time_minutes
  - duplicate_agent_development_reduction_pct
- id: GV-2
  name: Agent Catalog & Marketplace
  name_ja: Agent Catalog & Marketplace（社内カタログ）
  facet: governance
  file: patterns/gv-governance/gv2-agent-catalog-marketplace.md
  summary: 'Reviewed agents, skills, and tools are listed in an internal app-store-style catalog with purpose, owner, risk
    tier, estimated cost, quality score, and version so employees can discover, request access, and clone templates from a
    single window, eliminating duplicate development and unreviewed usage.

    '
  summary_ja: '審査済みエージェント・スキル・ツールを社内アプリストアとして一覧し、目的・所有者・リスク・コスト・品質スコアを確認してから利用申請できる社内カタログ。重複開発排除と審査済みエージェントへの誘導を単一窓口で実現する。

    '
  requires:
  - GV-1
  required_by: []
  applies_when:
  - multi_department
  - enterprise_scale
  - prod_deployment
  not_applicable_when:
  - single_team
  - poc_phase
  - poc_phase
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - Backstage (Internal Developer Portal)
  - ServiceNow
  - Jira Service Management
  - Usage Analytics
  - Quality Rating
  saas_targets:
  - ServiceNow
  - Jira Service Management
  interfaces:
  - name: Catalog UI/API
    description: Search and detail view exposing purpose, owner, risk tier, cost estimate, quality score, version, and approval
      status for each agent.
  - name: Access Request Workflow
    description: Structured access request requiring purpose, expiry, and data access scope; integrates with existing approval
      systems (ServiceNow, Jira SM).
  - name: Usage Analytics & Quality Score
    description: Aggregates execution logs, token consumption, and error rates into a quality score updated on each GV-7 evaluation
      run.
  value_kpis:
  - duplicate_agent_development_reduction_pct
  - time_to_discover_existing_agent_minutes
  - unreviewed_agent_usage_incident_count
- id: GV-3
  name: Department Agent Factory
  name_ja: Department Agent Factory（役割テンプレート工場）
  facet: governance
  file: patterns/gv-governance/gv3-department-agent-factory.md
  summary: 'Per-department and per-role standard templates bundled with policy packs, connector packs, and evaluation packs
    are used to mass-produce safe agents; when an employee joins, transfers, or leaves, tool and data permissions automatically
    follow IdP role changes with no manual steps.

    '
  summary_ja: '部門・役割ごとにポリシー・コネクタ・評価パックをセットにした標準テンプレートから安全なエージェントを量産する。Okta/Workday のロール変更に連動して権限付与・剥奪を自動追従させ、取り残しを防ぐ。

    '
  requires:
  - GV-1
  - GV-2
  - ID-4
  - GV-4
  required_by: []
  applies_when:
  - multi_department
  - enterprise_scale
  - frequent_perm_chg
  not_applicable_when:
  - single_team
  - poc_phase
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - YAML/JSON Template Store
  - Git (GV-6)
  - Low-Code Builder
  - Policy Pack (ID-7)
  - Connector Pack
  - Evaluation Pack (GV-7)
  - Okta
  - Workday
  saas_targets:
  - Okta
  - Workday
  - Salesforce
  - Jira
  interfaces:
  - name: Role-Based Template Store
    description: Git-managed YAML/JSON templates per department role (HR, Sales, CS, Finance) with bundled policy, connector,
      and evaluation packs.
  - name: Low-Code Builder
    description: Allows only derivative configuration from templates; blocks any settings outside the AI CoE-defined guardrails.
  - name: IdP Role Change Listener
    description: Receives Okta/Workday role-change events and triggers automatic permission grant/revoke in GV-1 Control Plane
      within a defined SLA.
  value_kpis:
  - new_department_agent_deployment_lead_time_days
  - permission_residual_after_departure_incident_count
  - template_reuse_rate_pct
- id: GV-4
  name: Industry Policy Pack
  name_ja: Industry Policy Pack（業界ポリシーパック）
  facet: governance
  file: patterns/gv-governance/gv4-industry-policy-pack.md
  summary: 'Industry-specific regulations, customs, and audit requirements are coded as reusable policy packs that are deployed
    simultaneously to the Policy-as-Code engine, evaluation CI, data classification rules, and approval workflow conditions;
    a pack update propagates regulation changes to all agents without touching individual prompts.

    '
  summary_ja: '業界特有の規制・慣習・監査要件を再利用可能なポリシーパックとしてコード化し、Policy-as-Code・評価CI・データ分類・承認ルールへ同時展開する。パック更新だけで規制改正が全エージェントに伝播し、プロンプト依存の脆弱な対応を排除する。

    '
  requires:
  - ID-6
  - ID-7
  required_by: []
  applies_when:
  - regulated_industry
  - multi_department
  - enterprise_scale
  - audit_required
  not_applicable_when:
  - single_team
  - public_data_only
  risk_tiers:
  - 3
  - 4
  - 5
  key_technologies:
  - OPA (Open Policy Agent) / Rego
  - YAML Policy Definition
  - Git
  - GV-7 Evaluation Pipeline
  - ServiceNow GRC
  - OneTrust
  - GV-6 Version Registry
  saas_targets:
  - ServiceNow
  interfaces:
  - name: Policy Pack Definition
    description: YAML/OPA-format package per industry/regulation containing prohibited operations, data classification rules,
      retention periods, approval requirements, and audit evidence requirements.
  - name: Policy Engine Deployment (ID-7)
    description: Deploys pack rules to the ID-7 Policy Engine so they are enforced at runtime independently of agent prompts.
  - name: Evaluation Rubric (GV-7)
    description: Pack-bundled evaluation rubrics and red-team scenarios loaded into the GV-7 CI pipeline to continuously measure
      regulatory compliance.
  value_kpis:
  - compliance_violation_incident_count
  - regulatory_audit_preparation_time_hours
  - policy_update_propagation_time_hours
- id: GV-5
  name: Central Model Gateway
  name_ja: Central Model Gateway（モデル・ベンダー統制）
  facet: governance
  file: patterns/gv-governance/gv5-central-model-gateway.md
  summary: 'All LLM calls are routed through a single model gateway that enforces an approved-model allowlist, routes top-secret
    data to on-premises/VPC inference and general data to external APIs, detects PII, measures token and cost per request,
    and records model version and data classification in audit metadata.

    '
  summary_ja: '全LLM呼び出しを単一ゲートウェイ経由にし、承認済みモデルのみ許可、極秘データはVPC内推論・一般データは外部APIへルーティング。PII検出・コスト計測・モデル版記録・監査を一箇所で集中制御する。

    '
  requires:
  - GV-1
  required_by: []
  applies_when:
  - enterprise_scale
  - confidential_data
  - external_llm_api
  - cost_mgmt_needed
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 1
  - 2
  - 3
  - 4
  - 5
  key_technologies:
  - LiteLLM
  - Portkey Proxy
  - Amazon Bedrock
  - Azure OpenAI (VNet integration)
  - vLLM
  - TGI (Text Generation Inference)
  - KM-6 DLP & Redaction Boundary
  saas_targets: []
  interfaces:
  - name: Model Approval Check
    description: Validates that the requested model is on the approved allowlist; blocks calls to unapproved or deprecated
      models.
  - name: Data Classification Router
    description: Routes top-secret classified requests to VPC/on-premises inference and general data requests to external
      API providers.
  - name: Token & Cost Meter
    description: Records per-request token counts and cost with cost_center tag; feeds GV-8 Cost Quota & Chargeback for department-level
      aggregation.
  value_kpis:
  - unauthorized_external_llm_transmission_incident_count
  - llm_cost_visibility_rate_pct
  - model_version_audit_coverage_pct
- id: GV-6
  name: Version Registry
  name_ja: Version Registry（モデル/プロンプト/ツール/ポリシー/索引の版管理）
  facet: governance
  file: patterns/gv-governance/gv6-version-registry.md
  summary: 'Model, prompt, tool, policy, RAG index, and schema versions are each tagged per execution log; changes go through
    PR review and automated evaluation (GV-7) before merge; production rollout uses canary with auto-rollback on quality/cost/error
    threshold breach, enabling full reproduction of past behavior from a run ID.

    '
  summary_ja: 'モデル・プロンプト・ツール・ポリシー・RAG索引・スキーマをバージョン管理し、PR・eval・カナリア・ロールバックの対象にする。実行IDからバージョンセット全体を取得して過去挙動を再現できる。

    '
  requires:
  - OB-1
  required_by: []
  applies_when:
  - continuous_updates
  - prod_deployment
  - audit_required
  - multi_agent
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 2
  - 3
  - 4
  key_technologies:
  - Git
  - MLflow Model Registry
  - LaunchDarkly (Feature Flag)
  - Canary Deploy Infrastructure
  - Eval Dataset
  - GV-7 Evaluation Pipeline
  saas_targets: []
  interfaces:
  - name: Version Tag per Execution
    description: Records model@version, prompt@commit_hash, tool@version, policy@version, index@version, and schema@version
      in every execution log for full reproduction.
  - name: PR-Gated Change Flow
    description: All changes to model/prompt/tool/policy/index must pass automated GV-7 evaluation before merge; failed evaluations
      block the PR.
  - name: Canary + Auto-Rollback
    description: Staged rollout (1%→5%→25%→100%) with continuous quality/cost/error monitoring; auto-rollback to previous
      version on threshold breach.
  value_kpis:
  - silent_quality_degradation_detection_time_hours
  - mean_time_to_rollback_minutes
  - audit_behavior_reproduction_success_rate_pct
- id: GV-7
  name: Evaluation & Governance Pipeline
  name_ja: Evaluation & Governance Pipeline（評価CI/CD）
  facet: governance
  file: patterns/gv-governance/gv7-evaluation-governance-pipeline.md
  summary: 'A multi-stage pipeline from change request through offline evaluation (golden dataset, LLM-as-judge, rubric),
    security evaluation (red-teaming, injection testing), policy evaluation (GV-4), shadow deploy, canary, production monitoring,
    and feedback loop provides continuous quality, safety, and compliance measurement for all agents.

    '
  summary_ja: '変更要求からオフライン評価・セキュリティ評価・シャドーデプロイ・カナリア・本番監視・フィードバックループまでをパイプラインとして設計し、ルーブリック・LLM-as-judge・レッドチーミング・人手レビューで品質を継続計測する。

    '
  requires:
  - OB-1
  required_by: []
  applies_when:
  - prod_deployment
  - continuous_updates
  - regulated_industry
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 1
  - 2
  - 3
  - 4
  key_technologies:
  - Golden Dataset
  - LLM-as-a-judge
  - promptfoo
  - DeepEval
  - Braintrust
  - GitHub Actions / GitLab CI
  - OB-1 Observability Lake
  saas_targets: []
  interfaces:
  - name: Offline Evaluation Gate (CI)
    description: Runs golden dataset evaluation, LLM-as-judge scoring, and characteristic assertions on every PR; blocks merge
      on failure.
  - name: Security Evaluation (Red-Teaming)
    description: Searches for prompt injection, jailbreak, and data leakage paths in the security evaluation phase; results
      fed back to the change request.
  - name: Production Drift Monitor
    description: Continuously detects quality drift, cost anomalies, and error rate increases in production; triggers GV-6
      rollback on threshold breach.
  value_kpis:
  - quality_regression_detection_lead_time_hours
  - security_vulnerability_pre_deployment_detection_rate_pct
  - policy_compliance_continuous_measurement_coverage_pct
- id: GV-8
  name: Cost Quota & Chargeback
  name_ja: Cost Quota & Chargeback（コスト配賦）
  facet: governance
  file: patterns/gv-governance/gv8-cost-quota-chargeback.md
  summary: 'Token consumption, tool call costs, and execution costs are measured per tenant, department, project, user, agent,
    and model via the Central Model Gateway; budget limits trigger degradation to cheaper models or cache-first mode to prevent
    cost explosion; ROI dashboards pair cost with business outcomes.

    '
  summary_ja: 'トークン・ツール・実行コストをテナント/部門/プロジェクト/ユーザー/エージェント/モデル単位で計測し、予算上限設定・縮退戦略・按分・ROIダッシュボードでコスト可視化と暴走防止を実現する。

    '
  requires:
  - GV-1
  - GV-5
  required_by: []
  applies_when:
  - enterprise_scale
  - cost_mgmt_needed
  - multi_agent
  not_applicable_when:
  - poc_phase
  - single_team
  risk_tiers:
  - 1
  - 2
  - 3
  - 4
  key_technologies:
  - Token Meter
  - Cost Attribution Pipeline
  - Budget/Quota Manager
  - FinOps Tools (CloudCost, Apptio)
  - Looker
  - Tableau
  - Power BI
  saas_targets: []
  interfaces:
  - name: cost_center Tag Attribution
    description: All LLM calls carry a cost_center tag (department code, project ID, tenant ID) enabling per-dimension aggregation.
  - name: Budget Alert & Degradation
    description: Alerts at 80% budget; at 100% switches to cheaper model, cache-first mode, or queues requests; prevents runaway
      inference chains.
  - name: ROI Dashboard
    description: Pairs cost data (denominator) with GV-10 business outcome data (numerator) to compute unit-cost-per-business-outcome
      per agent and department.
  value_kpis:
  - ai_cost_per_department_visibility_pct
  - inference_cost_overrun_incident_count
  - roi_calculation_coverage_pct
- id: GV-9
  name: Incident Response & Kill Switch
  name_ja: Incident Response & Kill Switch（事故対応・停止）
  facet: governance
  file: patterns/gv-governance/gv9-incident-response-kill-switch.md
  summary: 'Granular kill switches at model, agent, tool, and tenant scope enable immediate targeted stopping without halting
    all AI; a pre-defined incident response flow (detect, contain, preserve traces, assess impact, notify, remediate, postmortem)
    ensures incidents can be investigated and root-caused without loss of evidence.

    '
  summary_ja: 'モデル・エージェント・ツール・テナントの粒度で即座に停止できる Kill Switch と、検知→封じ込め→トレース保全→影響評価→通知→是正→ポストモーテムの対応フローを事前整備する。全体停止か放置かの二択を排除する。

    '
  requires:
  - OB-1
  - OB-2
  - GV-1
  - GV-5
  required_by: []
  applies_when:
  - prod_deployment
  - enterprise_scale
  not_applicable_when: []
  risk_tiers:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  key_technologies:
  - Kill Switch (Feature Flag / Gateway Blocklist)
  - Circuit Breaker
  - Runbook
  - Audit Snapshot
  - Event Store
  - Replay Tool
  - Access Revocation
  - PagerDuty
  - Splunk
  - Microsoft Sentinel
  saas_targets: []
  interfaces:
  - name: Granular Kill Switch
    description: Feature flag or gateway blocklist enabling immediate stop at model, agent, tool, or tenant scope without
      affecting other dimensions.
  - name: Trace Preservation
    description: Automatically snapshots relevant audit and trace data at incident detection time before any remediation changes
      the evidence state.
  - name: Incident Response Runbook
    description: Pre-defined automation-ready runbook covering detect→contain→preserve→assess→notify→fix→postmortem; postmortem
      outputs feed back to ID-7 and GV-7.
  value_kpis:
  - mean_time_to_contain_incident_minutes
  - partial_stop_vs_full_stop_ratio_pct
  - postmortem_action_implementation_rate_pct
- id: GV-10
  name: Three-Layer Value Measurement
  name_ja: Three-Layer Value Measurement（採用定着×生産性×経営KPI）
  facet: governance
  file: patterns/gv-governance/gv10-two-layer-value-measurement.md
  summary: 'AI investment value is measured across three layers: Layer 0 (adoption and retention: adoption rate, DAU/MAU),
    Layer 1 (individual/team: task time reduction, self-resolution rate, satisfaction), and Layer 2 (executive: lead time,
    revenue impact, support KPI); agent usage logs are joined with Salesforce/Zendesk/Workday data to produce ROI dashboards
    for management decisions.

    '
  summary_ja: '第0層（採用・定着）・第1層（個人/チーム効率）・第2層（経営KPI）の三層で計測し、利用ログと業務システム（Salesforce・Zendesk・Workday）データを結合してROIダッシュボードを構築する。「トークン数」ではなく真の事業価値を示す。

    '
  requires:
